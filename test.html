<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pelagone Resort | Experience Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="SENTIERI.js"></script>
    <script src="POI.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .bg-verde { background-color: #22c55e !important; }
        .bg-blu { background-color: #3b82f6 !important; }
        .bg-rosso { background-color: #ef4444 !important; }
        .bg-nero { background-color: #000000 !important; }

        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 380px; height: 100%; overflow-y: auto; background: #1e293b; border-right: 1px solid #334155; z-index: 20; }
        #map { flex: 1; position: relative; z-index: 10; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 50vh; z-index: 1000; border-radius: 25px 25px 0 0; transition: transform 0.3s ease; }
            #sidebar.collapsed { transform: translateY(calc(100% - 50px)); }
            #info-panel { left: 10px !important; right: 10px !important; bottom: 60px !important; }
        }

        #info-panel { display: none; position: fixed; bottom: 30px; left: 410px; right: 30px; z-index: 2000; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .qr-container { background: white; padding: 5px; border-radius: 8px; }
        
        .filter-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
        .filter-btn.active { background-color: #c5a059 !important; color: white; }
        
        #experience-overlay { position: fixed; inset: 0; z-index: 9999; background: #0f172a; overflow-y: auto; display: none; }
        .exp-card { overflow: hidden; border-radius: 1.5rem; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
        .exp-image { width: 100%; height: 220px; object-fit: cover; }
        
        /* Badge Info Professionali */
        .badge-info { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 6px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; color: #cbd5e1; display: flex; align-items: center; gap: 6px; }
        .badge-info i { width: 14px; height: 14px; color: #c5a059; }
    </style>
</head>
<body>
    <header class="h-[100px] bg-[#0f172a] border-b border-slate-800 flex items-center justify-between px-6 text-white shrink-0 relative z-50">
        <div class="flex flex-col cursor-pointer" onclick="location.reload()">
            <h1 class="text-2xl font-black tracking-widest text-[#c5a059] uppercase italic leading-tight">Pelagone</h1>
            <span class="text-[8px] tracking-[0.4em] uppercase opacity-60">Experience Hub</span>
        </div>
        <div class="flex space-x-1">
            <button onclick="filterTrails('all')" id="f-all" class="filter-btn active bg-slate-800 px-3 py-2 rounded-full text-[9px] font-black uppercase tracking-widest">Tutti</button>
            <button onclick="filterTrails('easy')" id="f-easy" class="filter-btn bg-slate-800 px-3 py-2 rounded-full text-[9px] font-black uppercase tracking-widest">Easy</button>
            <button onclick="filterTrails('pro')" id="f-pro" class="filter-btn bg-slate-800 px-3 py-2 rounded-full text-[9px] font-black uppercase tracking-widest">Pro</button>
        </div>
        <button onclick="toggleExperiences()" class="bg-[#c5a059] text-white px-4 py-2 rounded-full text-[9px] font-black uppercase shadow-lg shrink-0">⭐ Prenota Esperienza</button>
    </header>

    <div id="main-container">
        <aside id="sidebar" class="collapsed">
            <div class="md:hidden w-full h-[50px] flex items-center justify-center border-b border-slate-700 bg-slate-800 sticky top-0 z-50 cursor-pointer" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
                <span class="text-white text-[10px] font-black uppercase tracking-widest">Sfoglia Sentieri</span>
            </div>
            <div id="trail-list" class="p-4 space-y-3"></div>
        </aside>

        <main id="map">
            <div id="info-panel">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="text-center md:text-left flex-1">
                        <h2 id="ui-nome" class="text-xl md:text-2xl font-black uppercase text-slate-800 mb-2 leading-none">Nome Trail</h2>
                        <button id="btn-download" class="bg-blue-600 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase w-full md:w-auto">📂 Scarica GPX</button>
                    </div>
                    <div id="qr-wrapper" class="hidden md:flex flex-col items-center border-l pl-8">
                        <div id="qrcode" class="qr-container"></div>
                    </div>
                    <button onclick="closePanel()" class="absolute top-2 right-4 text-slate-400 text-xl">✕</button>
                </div>
            </div>
        </main>
    </div>

    <div id="experience-overlay" class="p-4 md:p-10">
        <div class="sticky top-0 bg-[#0f172a] py-4 mb-8 border-b border-white/10 flex justify-between items-center z-[10001]">
            <h2 class="text-2xl md:text-4xl font-black uppercase text-[#c5a059] italic tracking-tighter">Weekly Experiences</h2>
            <button onclick="toggleExperiences()" class="text-white text-3xl">✕</button>
        </div>
        <div id="experience-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-7xl mx-auto pb-20 text-white"></div>
    </div>

    <script>
        const BASE_URL_GPX = "https://orzoro.github.io/resort-experience/gpx/";
        const SHEET_MANUTENZIONE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0LjAfvMuepPzsxcOWuAvykxmW16NwcYSIH7vbPdiKulIUOBMTqBXzsR1fGuClt-tB54O5HzLfHZp/pub?gid=0&single=true&output=csv";
        const SHEET_EXPERIENCE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTROGsq0FZj3cnpRrqco8JWrjUt4I_d9b1aU1sF5TKrC7474hbQ1d8BtwNibjZFjPlnoplVPSwVw3vu/pub?gid=0&single=true&output=csv";

        const map = L.map('map', { zoomControl: false }).setView([42.9635639, 10.8630999], 13);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

        let trailStatus = {};
        let geoJsonLayer;

        const trailTable = {
            "SANTANSANO": { col: "rosso", sym: "square" }, "COMO HD": { col: "rosso", sym: "square" }, "ROGNOSO": { col: "rosso", sym: "square" },
            "DH AIONE": { col: "rosso", sym: "square" }, "CESSA RIGATTAIE": { col: "rosso", sym: "square" }, "AVVOLTORE": { col: "blu", sym: "circle" },
            "AINA": { col: "verde", sym: "circle" }, "COMO EASY": { col: "blu", sym: "circle" }, "PRISON BREAK": { col: "nero", sym: "diamond" }, "BUZZINO": { col: "rosso", sym: "square" },
            "CERRETELLE": { col: "blu", sym: "circle" }
        };

        function renderList(filter = 'all') {
            const list = document.getElementById('trail-list');
            if (!list || !geoJsonLayer) return;
            list.innerHTML = '';
            geoJsonLayer.eachLayer(layer => {
                const nome = layer.feature.properties.NOME;
                const nomeKey = nome.toUpperCase().trim();
                const isClosed = trailStatus[nomeKey] === true;
                const cfg = trailTable[nomeKey] || { col: "blu", sym: "circle" };
                const hexMap = { "verde": "#22c55e", "blu": "#3b82f6", "rosso": "#ef4444", "nero": "#000000" };
                const tailBg = { "verde": "bg-verde", "blu": "bg-blu", "rosso": "bg-rosso", "nero": "bg-nero" };
                
                layer.setStyle({ color: isClosed ? '#f59e0b' : hexMap[cfg.col], weight: 6, dashArray: isClosed ? '5,10' : null });

                if (filter === 'all' || (filter === 'easy' && (cfg.col === 'verde' || cfg.col === 'blu')) || (filter === 'pro' && (cfg.col === 'rosso' || cfg.col === 'nero'))) {
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-2xl flex justify-between items-center text-white cursor-pointer shadow-md transition-transform active:scale-95 ${isClosed ? 'bg-amber-600' : tailBg[cfg.col]}`;
                    card.innerHTML = `<span class="font-black uppercase text-[11px] leading-none">${isClosed ? '⚠️ ' : ''}${nome}</span><div class="symbol ${cfg.sym} bg-white/20"></div>`;
                    
                    card.onclick = () => {
                        map.fitBounds(layer.getBounds(), { padding: [50, 50] });
                        document.getElementById('ui-nome').innerText = nome;
                        document.getElementById('info-panel').style.display = 'block';
                        const nomeFileGPX = nome.toLowerCase().trim().replace(/\s+/g, '_') + ".gpx";
                        const finalLink = BASE_URL_GPX + nomeFileGPX;

                        if(window.innerWidth > 768) {
                            document.getElementById('qrcode').innerHTML = "";
                            new QRCode(document.getElementById('qrcode'), { text: finalLink, width: 90, height: 90 });
                        }
                        document.getElementById('btn-download').onclick = () => { window.open(finalLink, '_blank'); };
                        if(window.innerWidth <= 768) document.getElementById('sidebar').classList.add('collapsed');
                    };
                    list.appendChild(card);
                    layer.addTo(map);
                } else { map.removeLayer(layer); }
            });
        }

        async function caricaDatiManutenzione() {
            try {
                const proxyUrl = "https://corsproxy.io/?";
                const response = await fetch(proxyUrl + encodeURIComponent(SHEET_MANUTENZIONE_URL + "&cb=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(row => row.trim() !== '').slice(1);
                trailStatus = {};
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols.length >= 2) {
                        const nome = cols[0].trim().toUpperCase();
                        const stato = cols[1].trim().toUpperCase();
                        if (stato === "CHIUSO" || stato === "MANUTENZIONE") trailStatus[nome] = true;
                    }
                });
                if (typeof datiSentieri !== 'undefined') {
                    if (geoJsonLayer) map.removeLayer(geoJsonLayer);
                    geoJsonLayer = L.geoJSON(datiSentieri);
                    renderList();
                }
            } catch (e) { console.error(e); }
        }

        async function renderExperiences() {
            const grid = document.getElementById('experience-grid');
            grid.innerHTML = '<p class="text-white text-center col-span-full opacity-50 uppercase tracking-widest italic">Sincronizzazione...</p>';
            try {
                const proxyUrl = "https://corsproxy.io/?";
                const response = await fetch(proxyUrl + encodeURIComponent(SHEET_EXPERIENCE_URL + "&cb=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(row => row.trim() !== '').slice(1);
                grid.innerHTML = '';
                
                rows.forEach(row => {
                    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 10) return;
                    
                    const titolo = cols[0].replace(/^"|"$/g, '').trim();
                    const desc = cols[2].replace(/^"|"$/g, '').trim();
                    const durata = cols[3].replace(/^"|"$/g, '').trim();   // Colonna D
                    const costo = cols[4].replace(/^"|"$/g, '').trim();    // Colonna E
                    const cell = cols[6].replace(/^"|"$/g, '').trim();     // Colonna G
                    const difficolta = cols[7].replace(/^"|"$/g, '').trim(); // Colonna H
                    const persone = cols[8].replace(/^"|"$/g, '').trim();    // Colonna I
                    const imgUrl = (cols[9] || "").replace(/^"|"$/g, '').trim(); // Colonna J
                    
                    const cleanCell = cell.replace(/\D/g, '');
                    const waLink = `https://wa.me/${cleanCell.startsWith('39') ? cleanCell : '39'+cleanCell}?text=${encodeURIComponent('Ciao! Vorrei prenotare l\'esperienza: ' + titolo)}`;
                    
                    const card = document.createElement('div');
                    card.className = "exp-card flex flex-col shadow-2xl";
                    card.innerHTML = `
                        <div class="relative">
                            <img src="${imgUrl}" class="exp-image" alt="${titolo}">
                            <div class="absolute top-4 left-4 bg-[#c5a059] text-white text-[11px] font-black px-3 py-1.5 rounded-lg shadow-lg">€ ${costo}</div>
                        </div>
                        <div class="p-6 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="text-white text-2xl font-black uppercase mb-4 leading-tight tracking-tight italic">${titolo}</h3>
                                
                                <div class="flex flex-wrap gap-2 mb-6">
                                    <div class="badge-info"><i data-lucide="clock"></i>${durata}</div>
                                    <div class="badge-info"><i data-lucide="users"></i>${persone}</div>
                                    <div class="badge-info"><i data-lucide="mountain"></i>${difficolta}</div>
                                </div>

                                <p class="text-slate-400 text-xs italic mb-6 leading-relaxed border-l border-[#c5a059]/40 pl-3">"${desc}"</p>
                            </div>
                            <a href="${waLink}" target="_blank" class="bg-white text-slate-900 text-center py-4 rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-[#c5a059] hover:text-white transition-all shadow-lg">Invia Richiesta</a>
                        </div>`;
                    grid.appendChild(card);
                });
                // Attiva le icone Lucide
                lucide.createIcons();
            } catch (e) { grid.innerHTML = 'Errore caricamento.'; }
        }

        function toggleExperiences() { 
            const overlay = document.getElementById('experience-overlay');
            const isHidden = overlay.style.display === 'none' || overlay.style.display === '';
            overlay.style.display = isHidden ? 'block' : 'none';
            if(isHidden) renderExperiences(); 
        }
        function filterTrails(type) { document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('f-' + type).classList.add('active'); renderList(type); }
        function closePanel() { document.getElementById('info-panel').style.display = 'none'; }
        
        caricaDatiManutenzione();
    </script>
</body>
</html>
