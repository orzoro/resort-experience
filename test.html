<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Pelagone | Experience Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="SENTIERI.js"></script>
    <script src="POI.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #map { flex: 1; position: relative; z-index: 10; }

        #sidebar { 
            width: 380px; height: 100%; background: #1e293b; border-right: 1px solid #334155; 
            z-index: 1001; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        @media (max-width: 768px) {
            #sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70vh; border-radius: 25px 25px 0 0; transform: translateY(calc(100% - 60px)); }
            #sidebar.open { transform: translateY(0); }
        }

        #info-panel { display: none; position: fixed; bottom: 30px; left: 410px; right: 30px; z-index: 2000; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }

        #rental-overlay { position: fixed; inset: 0; z-index: 9999; background: #0f172a; overflow-y: auto; display: none; }
        .rent-card { background: #1e293b; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        
        .bg-verde { background-color: #22c55e !important; }
        .bg-blu { background-color: #3b82f6 !important; }
        .bg-rosso { background-color: #ef4444 !important; }
        .bg-nero { background-color: #000000 !important; }
        .symbol { width: 12px; height: 12px; display: inline-block; border: 1px solid white; vertical-align: middle; border-radius: 50%; }
    </style>
</head>
<body>
    <header class="h-[100px] bg-[#0f172a] border-b border-slate-800 flex items-center justify-between px-6 text-white relative z-[1002]">
        <div class="flex flex-col cursor-pointer" onclick="location.reload()">
            <h1 class="text-2xl font-black text-[#c5a059] uppercase italic leading-tight">Pelagone</h1>
            <span class="text-[7px] tracking-[0.3em] uppercase opacity-60">Experience Hub</span>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleOverlay('rental')" class="bg-slate-700 text-white px-5 py-2.5 rounded-full text-[10px] font-black uppercase border border-slate-600">🚲 Noleggio</button>
        </div>
    </header>

    <div id="main-container">
        <aside id="sidebar">
            <div id="trail-list" class="p-4 space-y-3 overflow-y-auto h-full">
                </div>
        </aside>
        <main id="map"></main>
    </div>

    <div id="rental-overlay" class="p-6 md:p-12">
        <div class="max-w-7xl mx-auto text-white">
            <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
                <h2 class="text-3xl md:text-5xl font-black uppercase text-[#c5a059] italic">Bike Rental Fleet</h2>
                <button onclick="toggleOverlay('rental')" class="text-white text-4xl font-light">✕</button>
            </div>
            <div id="rental-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                </div>
        </div>
    </div>

    <script>
        const SHEET_RENTAL_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSUGPACReczt9Rdq3YjiFsNrfa0NwRSTZqjqHXl1X-TPzwNLc1OKjXivvImulTgWRyyj-KuHLmYkMUb/pub?gid=0&single=true&output=csv";

        const map = L.map('map', { zoomControl: false }).setView([42.9635, 10.8631], 13);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

        function toggleOverlay(type) {
            const el = document.getElementById(type + '-overlay');
            el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'block' : 'none';
            if(el.style.display === 'block') renderRental();
        }

        async function renderRental() {
            const grid = document.getElementById('rental-grid');
            grid.innerHTML = '<p class="col-span-full text-center py-10 opacity-50 italic uppercase tracking-widest">Caricamento flotta...</p>';
            
            try {
                const response = await fetch("https://corsproxy.io/?" + encodeURIComponent(SHEET_RENTAL_URL + "&t=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(r => r.trim() !== '').slice(1);
                
                grid.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 6) return;
                    
                    const [modello, tipo, taglie, prezzo, img, cell, statoRaw] = cols.map(c => c.replace(/^"|"$/g, '').trim());
                    const stato = statoRaw || "Disponibile";
                    const isAvailable = stato.toLowerCase() === "disponibile";
                    const cleanCell = cell.replace(/\D/g, '');
                    const waLink = `https://wa.me/${cleanCell}?text=Ciao! Vorrei info per ${modello}`;

                    let statoCol = "bg-green-500";
                    if(stato.toLowerCase() === "occupata") statoCol = "bg-amber-500";
                    if(stato.toLowerCase() === "in manutenzione") statoCol = "bg-red-500";

                    const card = document.createElement('div');
                    card.className = `rent-card flex flex-col ${!isAvailable ? 'opacity-60' : ''}`;
                    card.innerHTML = `
                        <div class="relative h-52">
                            <img src="${img}" class="w-full h-full object-cover ${!isAvailable ? 'grayscale' : ''}" onerror="this.src='https://via.placeholder.com/400x300?text=Immagine+non+disponibile'">
                            <div class="absolute top-4 left-4 bg-white text-slate-900 font-black px-3 py-1 rounded text-[10px] shadow-lg">€ ${prezzo}</div>
                            <div class="absolute top-4 right-4 ${statoCol} text-white font-black px-2 py-1 rounded text-[8px] uppercase shadow-lg">${stato}</div>
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-black uppercase italic leading-tight">${modello}</h3>
                            <p class="text-[#c5a059] text-[10px] font-bold uppercase mb-4">${tipo}</p>
                            <p class="text-white/60 text-[11px] mb-6 font-bold uppercase tracking-tighter">Taglie: ${taglie}</p>
                            ${isAvailable 
                                ? `<a href="${waLink}" target="_blank" class="block w-full bg-[#c5a059] text-white text-center py-3 rounded-xl font-black uppercase text-[10px] tracking-widest hover:brightness-110">Prenota</a>`
                                : `<div class="block w-full bg-slate-700 text-slate-400 text-center py-3 rounded-xl font-black uppercase text-[10px] tracking-widest">Non disponibile</div>`
                            }
                        </div>`;
                    grid.appendChild(card);
                });
            } catch (e) {
                grid.innerHTML = '<p class="text-white text-center py-10">Errore nel caricamento. Riprova.</p>';
            }
        }

        // --- Logica Sentieri (Originale) ---
        function initTrails() {
            const list = document.getElementById('trail-list');
            if (typeof datiSentieri !== 'undefined') {
                L.geoJSON(datiSentieri, {
                    style: function(feature) { return { color: "#3b82f6", weight: 5 }; },
                    onEachFeature: function(feature, layer) {
                        const card = document.createElement('div');
                        card.className = "p-4 bg-slate-800 rounded-xl text-white font-black uppercase text-[10px] cursor-pointer hover:bg-slate-700 transition-all";
                        card.innerText = feature.properties.NOME;
                        card.onclick = () => map.fitBounds(layer.getBounds());
                        list.appendChild(card);
                    }
                }).addTo(map);
            }
        }

        initTrails();
    </script>
</body>
</html>
