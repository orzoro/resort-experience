<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Pelagone | Experience Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="SENTIERI.js"></script>
    <script src="POI.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .user-dot { background-color: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .bg-verde { background-color: #22c55e !important; }
        .bg-blu { background-color: #3b82f6 !important; }
        .bg-rosso { background-color: #ef4444 !important; }
        .bg-nero { background-color: #000000 !important; }
        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #map { flex: 1; position: relative; z-index: 10; }
        #sidebar { width: 380px; height: 100%; background: #1e293b; border-right: 1px solid #334155; z-index: 1001; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #info-panel { display: none; position: fixed; bottom: 30px; left: 410px; right: 30px; z-index: 2000; background: white; padding: 20px; border-radius: 20px; }
        #experience-overlay { position: fixed; inset: 0; z-index: 9999; background: #0f172a; overflow-y: auto; display: none; }
        .exp-card { overflow: hidden; border-radius: 1.5rem; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
        .exp-image { width: 100%; height: 220px; object-fit: cover; }
        .badge-info { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; color: #f8fafc; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <div id="main-container">
        <aside id="sidebar"><div id="trail-list" class="p-4 space-y-3 overflow-y-auto h-full"></div></aside>
        <main id="map">
            <div id="info-panel">
                <button onclick="closePanel()" class="absolute -top-3 -right-3 bg-white w-8 h-8 rounded-full shadow-lg">✕</button>
                <h2 id="ui-nome" class="text-xl font-black italic">Nome Trail</h2>
                <div class="flex gap-2">
                    <button id="btn-download" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px]">📂 GPX</button>
                    <button onclick="initTracking()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px]">📍 NAVIGA</button>
                </div>
            </div>
        </main>
    </div>

    <div id="experience-overlay" class="p-10 text-white">
        <button onclick="toggleExperiences()" class="text-white text-3xl absolute top-5 right-10">✕</button>
        <div id="experience-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </div>

    <script>
        // --- GPS ---
        let userMarker = null;
        function initTracking() {
            if (!navigator.geolocation) { alert("Geolocalizzazione non supportata."); return; }
            navigator.geolocation.watchPosition((position) => {
                const latlng = [position.coords.latitude, position.coords.longitude];
                if (!userMarker) {
                    const icon = L.divIcon({ className: 'user-dot', iconSize: [16, 16] });
                    userMarker = L.marker(latlng, { icon: icon }).addTo(map);
                } else { userMarker.setLatLng(latlng); }
            }, null, { enableHighAccuracy: true });
        }

        // --- CORE ---
        const BASE_URL_GPX = "https://orzoro.github.io/resort-experience/gpx/";
        const SHEET_MANUTENZIONE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0LjAfvMuepPzsxcOWuAvykxmW16NwcYSIH7vbPdiKulIUOBMTqBXzsR1fGuClt-tB54O5HzLfHZp/pub?gid=0&single=true&output=csv";
        const SHEET_EXPERIENCE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTROGsq0FZj3cnpRrqco8JWrjUt4I_d9b1aU1sF5TKrC7474hbQ1d8BtwNibjZFjPlnoplVPSwVw3vu/pub?gid=0&single=true&output=csv";

        const map = L.map('map', { zoomControl: false }).setView([42.9635639, 10.8630999], 13);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

        let trailStatus = {};
        let geoJsonLayer;

        async function init() {
            try {
                const response = await fetch(SHEET_MANUTENZIONE_URL);
                const data = await response.text();
                const rows = data.split(/\r?\n/).slice(1);
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols.length >= 2) {
                        const s = cols[1].trim().toUpperCase();
                        if(s === "CHIUSO" || s === "MANUTENZIONE") trailStatus[cols[0].trim().toUpperCase()] = true;
                    }
                });
                if (typeof datiSentieri !== 'undefined') {
                    geoJsonLayer = L.geoJSON(datiSentieri).addTo(map);
                    renderList();
                }
            } catch (e) { console.log(e); }
        }

        // (Incolla qui sotto la tua funzione renderList e renderExperiences che avevi nel file precedente)
        // ... (renderList e renderExperiences funzionanti) ...

        init();
    </script>
</body>
</html>
