<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Pelagone | Experience Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="SENTIERI.js"></script>
    <script src="POI.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .bg-verde { background-color: #22c55e !important; }
        .bg-blu { background-color: #3b82f6 !important; }
        .bg-rosso { background-color: #ef4444 !important; }
        .bg-nero { background-color: #000000 !important; }
        /* Aggiunta per il punto GPS */
        .user-dot { background-color: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <header class="h-[100px] bg-[#0f172a] border-b border-slate-800 flex items-center justify-between px-6 text-white">
        <h1 class="text-2xl font-black text-[#c5a059] uppercase italic">Pelagone</h1>
        <div class="flex gap-2">
            <button onclick="filterTrails('all')" id="f-all" class="filter-btn active px-3 py-1 rounded-full text-[10px] bg-slate-700">TUTTI</button>
            <button onclick="toggleExperiences()" class="bg-[#c5a059] px-4 py-2 rounded-full text-[10px] font-black">⭐ PRENOTA</button>
        </div>
    </header>

    <div id="main-container" class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="w-[380px] bg-[#1e293b] border-r border-slate-800 p-4 overflow-y-auto">
            <div id="trail-list" class="space-y-3"></div>
        </aside>
        <main id="map" class="flex-1 relative"></main>
    </div>

    <div id="info-panel" style="display:none;" class="fixed bottom-10 left-[400px] right-10 z-[2000] bg-white p-6 rounded-2xl shadow-2xl">
        <h2 id="ui-nome" class="text-xl font-black italic">Nome Trail</h2>
        <div class="flex gap-3 mt-4">
            <button id="btn-download" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-[10px] font-bold">📂 SCARICA GPX</button>
            <button onclick="initTracking()" class="bg-slate-900 text-white px-6 py-2 rounded-xl text-[10px] font-bold">📍 NAVIGA</button>
        </div>
        <div id="qrcode" class="mt-4"></div>
    </div>

    <div id="experience-overlay" style="display:none;" class="fixed inset-0 z-[9999] bg-[#0f172a] p-10 overflow-y-auto">
        <button onclick="toggleExperiences()" class="text-white text-3xl">✕</button>
        <div id="experience-grid" class="grid grid-cols-3 gap-8 mt-10"></div>
    </div>

    <script>
        // --- FUNZIONE GPS ---
        let userMarker = null;
        function initTracking() {
            if (!navigator.geolocation) { alert("Geolocalizzazione non supportata"); return; }
            navigator.geolocation.watchPosition((p) => {
                const ll = [p.coords.latitude, p.coords.longitude];
                if (!userMarker) {
                    userMarker = L.marker(ll, {icon: L.divIcon({className: 'user-dot', iconSize: [16, 16]})}).addTo(map);
                } else { userMarker.setLatLng(ll); }
            }, null, {enableHighAccuracy: true});
        }

        // --- CORE ---
        // (Qui dovresti avere le tue variabili BASE_URL_GPX, le chiamate a fetch, le funzioni renderList, renderExperiences e init)
        // Se incolli qui il blocco di script del tuo file originale (quello che funzionava prima delle modifiche), tutto tornerà a posto.
const BASE_URL_GPX = "https://orzoro.github.io/resort-experience/gpx/";
        const SHEET_MANUTENZIONE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0LjAfvMuepPzsxcOWuAvykxmW16NwcYSIH7vbPdiKulIUOBMTqBXzsR1fGuClt-tB54O5HzLfHZp/pub?gid=0&single=true&output=csv";
        const SHEET_EXPERIENCE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTROGsq0FZj3cnpRrqco8JWrjUt4I_d9b1aU1sF5TKrC7474hbQ1d8BtwNibjZFjPlnoplVPSwVw3vu/pub?gid=0&single=true&output=csv";

        const map = L.map('map', { zoomControl: false }).setView([42.9635639, 10.8630999], 13);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

        let trailStatus = {};
        let geoJsonLayer;

        const trailTable = {
            "SANTANSANO": { col: "rosso", sym: "square" }, "COMO HD": { col: "rosso", sym: "square" }, "ROGNOSO": { col: "rosso", sym: "square" },
            "DH AIONE": { col: "rosso", sym: "square" }, "CESSA RIGATTAIE": { col: "rosso", sym: "square" }, "AVVOLTORE": { col: "blu", sym: "circle" },
            "AINA": { col: "verde", sym: "circle" }, "COMO EASY": { col: "blu", sym: "circle" }, "PRISON BREAK": { col: "nero", sym: "diamond" }, "BUZZINO": { col: "rosso", sym: "square" },
            "CERRETELLE": { col: "blu", sym: "circle" }
        };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        function renderList(filter = 'all') {
            const list = document.getElementById('trail-list');
            if (!list || !geoJsonLayer) return;
            list.innerHTML = '';
            geoJsonLayer.eachLayer(layer => {
                const nome = layer.feature.properties.NOME;
                const nomeKey = nome.toUpperCase().trim();
                const isClosed = trailStatus[nomeKey] === true;
                const cfg = trailTable[nomeKey] || { col: "blu", sym: "circle" };
                const hexMap = { "verde": "#22c55e", "blu": "#3b82f6", "rosso": "#ef4444", "nero": "#000000" };
                const tailBg = { "verde": "bg-verde", "blu": "bg-blu", "rosso": "bg-rosso", "nero": "bg-nero" };
                
                layer.setStyle({ color: isClosed ? '#f59e0b' : hexMap[cfg.col], weight: 6, dashArray: isClosed ? '5,10' : null });

                if (filter === 'all' || (filter === 'easy' && (cfg.col === 'verde' || cfg.col === 'blu')) || (filter === 'pro' && (cfg.col === 'rosso' || cfg.col === 'nero'))) {
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-xl flex justify-between items-center text-white cursor-pointer transition-all active:scale-95 ${isClosed ? 'bg-amber-600' : tailBg[cfg.col]}`;
                    card.innerHTML = `<span class="font-black uppercase text-[10px]">${isClosed ? '⚠️ ' : ''}${nome}</span><div class="symbol ${cfg.sym} bg-white/20"></div>`;
                    
                    card.onclick = () => {
                        map.fitBounds(layer.getBounds(), { padding: [30, 80] });
                        if(layer.getElement()) {
                            layer.getElement().classList.add('flash-path');
                            setTimeout(() => { if(layer.getElement()) layer.getElement().classList.remove('flash-path'); }, 3000);
                        }
                        document.getElementById('ui-nome').innerText = nome;
                        document.getElementById('info-panel').style.display = 'block';
                        const finalLink = BASE_URL_GPX + nome.toLowerCase().trim().replace(/\s+/g, '_') + ".gpx";
                        if(window.innerWidth > 768) {
                            document.getElementById('qrcode').innerHTML = "";
                            new QRCode(document.getElementById('qrcode'), { text: finalLink, width: 80, height: 80 });
                        }
                        document.getElementById('btn-download').onclick = () => window.open(finalLink, '_blank');
                        if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
                    };
                    list.appendChild(card);
                    layer.addTo(map);
                } else { map.removeLayer(layer); }
            });
        }

        async function renderExperiences() {
            const grid = document.getElementById('experience-grid');
            grid.innerHTML = '<p class="text-white text-center col-span-full opacity-50 uppercase tracking-widest italic">Sincronizzazione...</p>';
            try {
                const proxyUrl = "https://corsproxy.io/?";
                const response = await fetch(proxyUrl + encodeURIComponent(SHEET_EXPERIENCE_URL + "&cb=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(row => row.trim() !== '').slice(1);
                grid.innerHTML = '';
                
                rows.forEach(row => {
                    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 10) return;
                    
                    // --- MAPPATURA: I=Orologio(8), H=Omini(7), D=Montagna(3) ---
                    const titolo     = cols[0].replace(/^"|"$/g, '').trim(); 
                    const desc       = cols[2].replace(/^"|"$/g, '').trim(); 
                    const difficolta = cols[3].replace(/^"|"$/g, '').trim(); // D
                    const costo      = cols[4].replace(/^"|"$/g, '').trim(); 
                    const cell       = cols[6].replace(/^"|"$/g, '').trim(); 
                    const persone    = cols[7].replace(/^"|"$/g, '').trim(); // H
                    const durata     = cols[8].replace(/^"|"$/g, '').trim(); // I
                    const imgUrl     = (cols[9] || "").replace(/^"|"$/g, '').trim(); 
                    
                    const cleanCell = cell.replace(/\D/g, '');
                    const waLink = `https://wa.me/${cleanCell.startsWith('39') ? cleanCell : '39'+cleanCell}?text=${encodeURIComponent('Ciao! Vorrei prenotare: ' + titolo)}`;
                    
                    const card = document.createElement('div');
                    card.className = "exp-card flex flex-col shadow-2xl";
                    card.innerHTML = `
                        <div class="relative"><img src="${imgUrl}" class="exp-image"><div class="absolute top-4 left-4 bg-[#c5a059] text-white text-[12px] font-black px-3 py-1.5 rounded-lg shadow-lg">€ ${costo}</div></div>
                        <div class="p-6 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="text-white text-2xl font-black uppercase mb-5 leading-tight italic">${titolo}</h3>
                                <div class="flex flex-wrap gap-2 mb-6">
                                    <div class="badge-info"><i data-lucide="clock"></i> ${durata}</div>
                                    <div class="badge-info"><i data-lucide="users"></i> ${persone}</div>
                                    <div class="badge-info"><i data-lucide="mountain"></i> ${difficolta}</div>
                                </div>
                                <p class="text-slate-400 text-xs italic mb-6 leading-relaxed border-l border-[#c5a059]/40 pl-3">"${desc}"</p>
                            </div>
                            <a href="${waLink}" target="_blank" class="bg-white text-slate-900 text-center py-4 rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-[#c5a059] hover:text-white transition-all shadow-lg">Invia Richiesta</a>
                        </div>`;
                    grid.appendChild(card);
                });
                lucide.createIcons();
            } catch (e) { grid.innerHTML = 'Errore.'; }
        }

        async function init() {
            try {
                const proxyUrl = "https://corsproxy.io/?";
                const response = await fetch(proxyUrl + encodeURIComponent(SHEET_MANUTENZIONE_URL + "&cb=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).slice(1);
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols.length >= 2) {
                        const s = cols[1].trim().toUpperCase();
                        if(s === "CHIUSO" || s === "MANUTENZIONE") trailStatus[cols[0].trim().toUpperCase()] = true;
                    }
                });
                if (typeof datiSentieri !== 'undefined') {
                    geoJsonLayer = L.geoJSON(datiSentieri);
                    renderList();
                }
            } catch (e) { console.log(e); }
            lucide.createIcons();
        }

        function toggleExperiences() { 
            const overlay = document.getElementById('experience-overlay');
            const isHidden = (overlay.style.display === 'none' || overlay.style.display === '');
            overlay.style.display = isHidden ? 'block' : 'none';
            if(isHidden) renderExperiences();
        }
        function filterTrails(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('f-' + type).classList.add('active');
            renderList(type);
        }
        function closePanel() { document.getElementById('info-panel').style.display = 'none'; }
        
        init();
    </script>
</body>
</html>
