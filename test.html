<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Pelagone | Experience Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="SENTIERI.js"></script>
    <script src="POI.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        /* Responsive Sidebar */
        #sidebar { width: 380px; height: 100%; background: #1e293b; border-right: 1px solid #334155; z-index: 1001; transition: transform 0.3s ease; }
        @media (max-width: 768px) { #sidebar { position: fixed; transform: translateX(-100%); } #sidebar.open { transform: translateX(0); } }
        
        .user-dot { background-color: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .filter-btn { background-color: #475569; color: white; }
        .filter-btn.active { background-color: #c5a059 !important; }
        .bg-verde { background-color: #22c55e !important; }
        .bg-blu { background-color: #3b82f6 !important; }
        .bg-rosso { background-color: #ef4444 !important; }
        .bg-nero { background-color: #000000 !important; }
        .exp-image { width: 100%; height: 220px; object-fit: cover; }
        .badge-info { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; color: #f8fafc; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <header class="h-[100px] bg-[#0f172a] border-b border-slate-800 flex items-center justify-between px-6 text-white">
        <h1 class="text-2xl font-black text-[#c5a059] uppercase italic cursor-pointer" onclick="document.getElementById('sidebar').classList.toggle('open')">Pelagone</h1>
        <div class="flex gap-1 md:gap-2">
            <button onclick="filterTrails('all')" id="f-all" class="filter-btn active px-3 py-1 rounded-full text-[10px] font-bold">TUTTI</button>
            <button onclick="filterTrails('easy')" id="f-easy" class="filter-btn px-3 py-1 rounded-full text-[10px] font-bold">EASY</button>
            <button onclick="filterTrails('pro')" id="f-pro" class="filter-btn px-3 py-1 rounded-full text-[10px] font-bold">PRO</button>
            <button onclick="toggleExperiences()" class="bg-[#c5a059] px-4 py-2 rounded-full text-[10px] font-black ml-2">⭐ PRENOTA</button>
        </div>
    </header>

    <div id="main-container">
        <aside id="sidebar"><div id="trail-list" class="p-4 space-y-3 overflow-y-auto h-full"></div></aside>
        <main id="map" class="flex-1">
            <div id="info-panel" style="display:none; position:fixed; bottom:30px; left:20px; right:20px; md:left:410px; z-index:2000; background:white; padding:20px; border-radius:20px;">
                <button onclick="closePanel()" class="absolute top-2 right-2 bg-slate-200 w-8 h-8 rounded-full text-[12px]">✕</button>
                <h2 id="ui-nome" class="text-xl font-black italic">Nome Trail</h2>
                <div id="qrcode" class="my-2"></div>
                <div class="flex gap-2 mt-2">
                    <button id="btn-download" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">📂 GPX</button>
                    <button onclick="initTracking()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-bold">📍 NAVIGA</button>
                </div>
            </div>
        </main>
    </div>

    <div id="experience-overlay" style="display:none; position:fixed; inset:0; z-index:9999; background:#0f172a; padding:40px; overflow-y:auto;">
        <button onclick="toggleExperiences()" class="text-white text-3xl absolute top-5 right-10">✕</button>
        <div id="experience-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </div>

    <script>
        // --- FUNZIONI CORE ---
        let userMarker = null;
        function initTracking() {
            if (!navigator.geolocation) { alert("Geolocalizzazione non supportata."); return; }
            navigator.geolocation.watchPosition((p) => {
                const ll = [p.coords.latitude, p.coords.longitude];
                if (!userMarker) userMarker = L.marker(ll, {icon: L.divIcon({className:'user-dot', iconSize:[16,16]})}).addTo(map);
                else userMarker.setLatLng(ll);
                map.setView(ll, 16);
            }, null, {enableHighAccuracy: true});
        }

        const BASE_URL_GPX = "https://orzoro.github.io/resort-experience/gpx/";
        const SHEET_MANUTENZIONE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0LjAfvMuepPzsxcOWuAvykxmW16NwcYSIH7vbPdiKulIUOBMTqBXzsR1fGuClt-tB54O5HzLfHZp/pub?gid=0&single=true&output=csv";
        const SHEET_EXPERIENCE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTROGsq0FZj3cnpRrqco8JWrjUt4I_d9b1aU1sF5TKrC7474hbQ1d8BtwNibjZFjPlnoplVPSwVw3vu/pub?gid=0&single=true&output=csv";

        const map = L.map('map', { zoomControl: false }).setView([42.9635639, 10.8630999], 13);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

        let trailStatus = {};
        let geoJsonLayer;

        const trailTable = {
            "SANTANSANO": { col: "rosso", sym: "square" }, "COMO HD": { col: "rosso", sym: "square" }, "ROGNOSO": { col: "rosso", sym: "square" },
            "DH AIONE": { col: "rosso", sym: "square" }, "CESSA RIGATTAIE": { col: "rosso", sym: "square" }, "AVVOLTORE": { col: "blu", sym: "circle" },
            "AINA": { col: "verde", sym: "circle" }, "COMO EASY": { col: "blu", sym: "circle" }, "PRISON BREAK": { col: "nero", sym: "diamond" }, "BUZZINO": { col: "rosso", sym: "square" },
            "CERRETELLE": { col: "blu", sym: "circle" }
        };

        function renderList(filter = 'all') {
            const list = document.getElementById('trail-list');
            if (!list || !geoJsonLayer) return;
            list.innerHTML = '';
            geoJsonLayer.eachLayer(layer => {
                const nome = layer.feature.properties.NOME;
                const nomeKey = nome.toUpperCase().trim();
                const isClosed = trailStatus[nomeKey] === true;
                const cfg = trailTable[nomeKey] || { col: "blu", sym: "circle" };
                const hexMap = { "verde": "#22c55e", "blu": "#3b82f6", "rosso": "#ef4444", "nero": "#000000" };
                const tailBg = { "verde": "bg-verde", "blu": "bg-blu", "rosso": "bg-rosso", "nero": "bg-nero" };
                
                layer.setStyle({ color: isClosed ? '#f59e0b' : hexMap[cfg.col], weight: 6, dashArray: isClosed ? '5,10' : null });

                // Logica Filtri
                const show = (filter === 'all') || 
                             (filter === 'easy' && (cfg.col === 'verde' || cfg.col === 'blu')) || 
                             (filter === 'pro' && (cfg.col === 'rosso' || cfg.col === 'nero'));

                if (show) {
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-xl flex justify-between items-center text-white cursor-pointer ${isClosed ? 'bg-amber-600' : tailBg[cfg.col]}`;
                    card.innerHTML = `<span class="font-black uppercase text-[10px]">${isClosed ? '⚠️ ' : ''}${nome}</span>`;
                    card.onclick = () => {
                        map.fitBounds(layer.getBounds(), { padding: [30, 80] });
                        document.getElementById('ui-nome').innerText = nome;
                        document.getElementById('info-panel').style.display = 'block';
                        const finalLink = BASE_URL_GPX + nome.toLowerCase().trim().replace(/\s+/g, '_') + ".gpx";
                        document.getElementById('btn-download').onclick = () => window.open(finalLink, '_blank');
                        if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
                    };
                    list.appendChild(card);
                    layer.addTo(map);
                } else { map.removeLayer(layer); }
            });
        }

        async function init() {
            const res = await fetch("https://corsproxy.io/?" + encodeURIComponent(SHEET_MANUTENZIONE_URL));
            const data = await res.text();
            data.split(/\r?\n/).slice(1).forEach(row => {
                const cols = row.split(',');
                if(cols.length >= 2 && (cols[1].trim().toUpperCase() === "CHIUSO")) trailStatus[cols[0].trim().toUpperCase()] = true;
            });
            if (typeof datiSentieri !== 'undefined') {
                geoJsonLayer = L.geoJSON(datiSentieri).addTo(map);
                renderList();
            }
        }

        function filterTrails(type) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('f-' + type).classList.add('active');
            renderList(type);
        }

        function toggleExperiences() {
            const o = document.getElementById('experience-overlay');
            o.style.display = (o.style.display === 'none') ? 'block' : 'none';
            if(o.style.display === 'block') renderExperiences();
        }
        function closePanel() { document.getElementById('info-panel').style.display = 'none'; }
        
        init();
    </script>
</body>
</html>
