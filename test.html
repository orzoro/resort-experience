<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Pelagone | Experience & Bike Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="SENTIERI.js"></script>
    <script src="POI.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .bg-verde { background-color: #22c55e !important; }
        .bg-blu { background-color: #3b82f6 !important; }
        .bg-rosso { background-color: #ef4444 !important; }
        .bg-nero { background-color: #000000 !important; }

        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #map { flex: 1; position: relative; z-index: 10; }

        /* Sidebar & Bottom Sheet */
        #sidebar { 
            width: 380px; height: 100%; background: #1e293b; border-right: 1px solid #334155; 
            z-index: 1001; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        @media (max-width: 768px) {
            #sidebar { 
                position: fixed; bottom: 0; left: 0; width: 100%; height: 70vh; 
                border-right: none; border-radius: 25px 25px 0 0; transform: translateY(calc(100% - 60px));
            }
            #sidebar.open { transform: translateY(0); }
            #info-panel { left: 10px !important; right: 10px !important; bottom: 80px !important; width: calc(100% - 20px) !important; }
        }

        /* Animazioni */
        @keyframes pathFlash { 0% { opacity: 1; stroke-width: 12; } 50% { opacity: 0.3; stroke-width: 22; } 100% { opacity: 1; stroke-width: 12; } }
        .flash-path { animation: pathFlash 0.5s ease-in-out 6; }

        .filter-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; font-weight: 800; }
        .filter-btn.active { background-color: #c5a059 !important; color: white; border-color: #c5a059; }
        
        #info-panel { display: none; position: fixed; bottom: 30px; left: 410px; right: 30px; z-index: 2000; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .symbol { width: 12px; height: 12px; display: inline-block; border: 1px solid white; vertical-align: middle; }
        .circle { border-radius: 50%; }
        .square { border-radius: 2px; }
        .diamond { transform: rotate(45deg) scale(0.8); }

        /* Overlay Styles */
        #experience-overlay, #rental-overlay { position: fixed; inset: 0; z-index: 9999; background: #0f172a; overflow-y: auto; display: none; }
        .exp-card, .rent-card { overflow: hidden; border-radius: 1.5rem; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; }
        .exp-card:hover, .rent-card:hover { transform: translateY(-5px); }
        .card-img { width: 100%; height: 220px; object-fit: cover; }
    </style>
</head>
<body>
    <header class="h-[100px] bg-[#0f172a] border-b border-slate-800 flex items-center justify-between px-4 md:px-6 text-white shrink-0 relative z-[1002]">
        <div class="flex flex-col cursor-pointer" onclick="location.reload()">
            <h1 class="text-xl md:text-2xl font-black text-[#c5a059] uppercase italic leading-tight">Pelagone</h1>
            <span class="text-[7px] tracking-[0.3em] uppercase opacity-60">Experience Hub</span>
        </div>

        <div class="flex bg-slate-800/50 p-1 rounded-full border border-slate-700">
            <button onclick="filterTrails('all')" id="f-all" class="filter-btn active px-3 py-1.5 rounded-full text-[8px] uppercase">Tutti</button>
            <button onclick="filterTrails('easy')" id="f-easy" class="filter-btn px-3 py-1.5 rounded-full text-[8px] uppercase">Easy</button>
            <button onclick="filterTrails('pro')" id="f-pro" class="filter-btn px-3 py-1.5 rounded-full text-[8px] uppercase">Pro</button>
        </div>

        <div class="flex gap-2">
            <button onclick="toggleOverlay('rental')" class="hidden md:block bg-slate-700 text-white px-4 py-2 rounded-full text-[9px] font-black uppercase active:scale-95 transition-all">🚲 Noleggio</button>
            <button onclick="toggleOverlay('experience')" class="bg-[#c5a059] text-white px-4 py-2 rounded-full text-[9px] font-black uppercase shadow-lg active:scale-95 transition-all">⭐ Prenota</button>
        </div>
    </header>

    <div id="main-container">
        <aside id="sidebar">
            <div class="md:hidden w-full h-[60px] flex items-center justify-center cursor-pointer border-b border-slate-700 bg-slate-800" onclick="toggleSidebar()">
                <div class="w-12 h-1 bg-slate-500 rounded-full absolute top-3"></div>
                <span class="text-white text-[10px] font-black uppercase mt-2">Sfoglia i Sentieri</span>
            </div>
            <div id="trail-list" class="p-4 space-y-3 overflow-y-auto h-[calc(100%-60px)] md:h-full"></div>
        </aside>

        <main id="map">
            <div id="info-panel">
                <button onclick="closePanel()" class="absolute -top-3 -right-3 bg-white w-8 h-8 rounded-full shadow-lg flex items-center justify-center text-slate-900 font-bold border border-slate-200">✕</button>
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div class="flex-1 w-full text-center md:text-left">
                        <h2 id="ui-nome" class="text-lg md:text-2xl font-black uppercase text-slate-800 italic leading-tight mb-2">Nome Trail</h2>
                        
                        <!-- SUGGERIMENTO INTELLIGENTE BIKE -->
                        <div id="smart-bike-box" class="mb-4 bg-slate-100 p-3 rounded-xl border-l-4 border-[#c5a059] hidden">
                            <p class="text-[9px] uppercase font-bold text-slate-500 mb-1 tracking-tighter">Consiglio della Guida:</p>
                            <p id="smart-bike-text" class="text-[11px] font-black text-slate-800"></p>
                        </div>

                        <button id="btn-download" class="bg-blue-600 text-white px-6 py-4 rounded-xl text-[10px] font-black uppercase w-full md:w-auto shadow-md active:scale-95 transition-all">📂 Scarica GPX</button>
                    </div>
                    <div id="qrcode" class="hidden md:block bg-white p-2 rounded-lg border"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Overlay Noleggio -->
    <div id="rental-overlay" class="p-4 md:p-10">
        <div class="sticky top-0 bg-[#0f172a] py-4 mb-8 border-b border-white/10 flex justify-between items-center z-[10001]">
            <h2 class="text-2xl md:text-4xl font-black uppercase text-[#c5a059] italic">Bike Fleet Rental</h2>
            <button onclick="toggleOverlay('rental')" class="text-white text-3xl">✕</button>
        </div>
        <div id="rental-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-7xl mx-auto pb-20 text-white"></div>
    </div>

    <!-- Overlay Esperienze -->
    <div id="experience-overlay" class="p-4 md:p-10">
        <div class="sticky top-0 bg-[#0f172a] py-4 mb-8 border-b border-white/10 flex justify-between items-center z-[10001]">
            <h2 class="text-2xl md:text-4xl font-black uppercase text-[#c5a059] italic">Weekly Experiences</h2>
            <button onclick="toggleOverlay('experience')" class="text-white text-3xl">✕</button>
        </div>
        <div id="experience-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-7xl mx-auto pb-20 text-white"></div>
    </div>

    <script>
        const SHEET_MANUTENZIONE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0LjAfvMuepPzsxcOWuAvykxmW16NwcYSIH7vbPdiKulIUOBMTqBXzsR1fGuClt-tB54O5HzLfHZp/pub?gid=0&single=true&output=csv";
        const SHEET_EXPERIENCE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTROGsq0FZj3cnpRrqco8JWrjUt4I_d9b1aU1sF5TKrC7474hbQ1d8BtwNibjZFjPlnoplVPSwVw3vu/pub?gid=0&single=true&output=csv";
        const SHEET_RENTAL_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSUGPACReczt9Rdq3YjiFsNrfa0NwRSTZqjqHXl1X-TPzwNLc1OKjXivvImulTgWRyyj-KuHLmYkMUb/pub?gid=0&single=true&output=csv";
        const BASE_URL_GPX = "https://orzoro.github.io/resort-experience/gpx/";

        const map = L.map('map', { zoomControl: false }).setView([42.9635, 10.8631], 13);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

        let trailStatus = {}, geoJsonLayer;
        const trailTable = {
            "SANTANSANO": { col: "rosso", sym: "square" }, "COMO HD": { col: "rosso", sym: "square" }, "ROGNOSO": { col: "rosso", sym: "square" },
            "DH AIONE": { col: "rosso", sym: "square" }, "CESSA RIGATTAIE": { col: "rosso", sym: "square" }, "AVVOLTORE": { col: "blu", sym: "circle" },
            "AINA": { col: "verde", sym: "circle" }, "COMO EASY": { col: "blu", sym: "circle" }, "PRISON BREAK": { col: "nero", sym: "diamond" }, "BUZZINO": { col: "rosso", sym: "square" },
            "CERRETELLE": { col: "blu", sym: "circle" }
        };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function toggleOverlay(type) {
            const el = document.getElementById(type + '-overlay');
            const isHidden = (el.style.display === 'none' || el.style.display === '');
            el.style.display = isHidden ? 'block' : 'none';
            if(isHidden) type === 'rental' ? renderRental() : renderExperiences();
        }

        function renderList(filter = 'all') {
            const list = document.getElementById('trail-list');
            if (!list || !geoJsonLayer) return;
            list.innerHTML = '';
            geoJsonLayer.eachLayer(layer => {
                const nome = layer.feature.properties.NOME;
                const nomeKey = nome.toUpperCase().trim();
                const isClosed = trailStatus[nomeKey] === true;
                const cfg = trailTable[nomeKey] || { col: "blu", sym: "circle" };
                const hexMap = { "verde": "#22c55e", "blu": "#3b82f6", "rosso": "#ef4444", "nero": "#000000" };
                const tailBg = { "verde": "bg-verde", "blu": "bg-blu", "rosso": "bg-rosso", "nero": "bg-nero" };
                
                layer.setStyle({ color: isClosed ? '#f59e0b' : hexMap[cfg.col], weight: 6, dashArray: isClosed ? '5,10' : null });

                if (filter === 'all' || (filter === 'easy' && (cfg.col === 'verde' || cfg.col === 'blu')) || (filter === 'pro' && (cfg.col === 'rosso' || cfg.col === 'nero'))) {
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-xl flex justify-between items-center text-white cursor-pointer transition-all active:scale-95 ${isClosed ? 'bg-amber-600' : tailBg[cfg.col]}`;
                    card.innerHTML = `<span class="font-black uppercase text-[10px]">${isClosed ? '⚠️ ' : ''}${nome}</span><div class="symbol ${cfg.sym} bg-white/20"></div>`;
                    
                    card.onclick = () => {
                        map.fitBounds(layer.getBounds(), { padding: [30, 80] });
                        if(layer.getElement()) {
                            layer.getElement().classList.add('flash-path');
                            setTimeout(() => { if(layer.getElement()) layer.getElement().classList.remove('flash-path'); }, 3000);
                        }
                        
                        // Pannello Info
                        document.getElementById('ui-nome').innerText = nome;
                        document.getElementById('info-panel').style.display = 'block';
                        
                        // SUGGERIMENTO BIKE DINAMICO
                        const smartBox = document.getElementById('smart-bike-box');
                        const smartText = document.getElementById('smart-bike-text');
                        smartBox.classList.remove('hidden');
                        if(cfg.col === 'verde' || cfg.col === 'blu') {
                            smartText.innerText = "Ottimo per Gravel o Trekking Bike";
                        } else {
                            smartText.innerText = "Consigliata E-MTB Full Suspension";
                        }

                        const finalLink = BASE_URL_GPX + nome.toLowerCase().trim().replace(/\s+/g, '_') + ".gpx";
                        if(window.innerWidth > 768) {
                            document.getElementById('qrcode').innerHTML = "";
                            new QRCode(document.getElementById('qrcode'), { text: finalLink, width: 80, height: 80 });
                        }
                        document.getElementById('btn-download').onclick = () => window.open(finalLink, '_blank');
                        if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
                    };
                    list.appendChild(card);
                    layer.addTo(map);
                } else { map.removeLayer(layer); }
            });
        }

        async function renderRental() {
            const grid = document.getElementById('rental-grid');
            grid.innerHTML = '<p class="col-span-full text-center py-10 opacity-50 italic">Sincronizzazione flotta...</p>';
            try {
                const response = await fetch("https://corsproxy.io/?" + encodeURIComponent(SHEET_RENTAL_URL + "&cb=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(r => r.trim() !== '').slice(1);
                grid.innerHTML = '';
                rows.forEach(row => {
                    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 6) return;
                    
                    const [modello, tipo, taglie, prezzo, img, cell, stato] = cols.map(c => c.replace(/^"|"$/g, '').trim());
                    const isAvailable = stato && stato.toLowerCase() === "disponibile";
                    const waLink = `https://wa.me/${cell.replace(/\D/g, '')}?text=${encodeURIComponent('Ciao! Vorrei info per il noleggio della ' + modello + ' taglia ' + taglie)}`;
                    
                    let statoClass = "bg-green-500";
                    if (stato && stato.toLowerCase() === "occupata") statoClass = "bg-amber-500";
                    if (stato && stato.toLowerCase() === "in manutenzione") statoClass = "bg-red-500";

                    const card = document.createElement('div');
                    card.className = `rent-card flex flex-col ${!isAvailable ? 'opacity-75' : ''}`;
                    card.innerHTML = `
                        <div class="relative">
                            <img src="${img}" class="card-img ${!isAvailable ? 'grayscale' : ''}">
                            <div class="absolute top-4 left-4 bg-white text-slate-900 text-[10px] font-black px-3 py-1 rounded-lg shadow-xl">€ ${prezzo}</div>
                            <div class="absolute top-4 right-4 ${statoClass} text-white text-[8px] font-black px-2 py-1 rounded uppercase tracking-tighter shadow-lg">${stato}</div>
                        </div>
                        <div class="p-5 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="text-xl font-black uppercase leading-tight mb-1 italic">${modello}</h3>
                                <p class="text-[10px] text-[#c5a059] font-bold uppercase mb-4 tracking-widest">${tipo}</p>
                                <div class="bg-slate-800/50 p-3 rounded-lg mb-4 border border-white/5">
                                    <span class="text-[9px] uppercase opacity-50 block mb-1">Taglie</span>
                                    <span class="text-sm font-bold">${taglie}</span>
                                </div>
                            </div>
                            ${isAvailable 
                                ? `<a href="${waLink}" target="_blank" class="bg-[#c5a059] text-white text-center py-3 rounded-xl font-black uppercase text-[10px] tracking-widest hover:brightness-110 transition-all">Verifica Disponibilità</a>`
                                : `<div class="bg-slate-700 text-slate-400 text-center py-3 rounded-xl font-black uppercase text-[10px] tracking-widest cursor-not-allowed">Non Disponibile</div>`
                            }
                        </div>`;
                    grid.appendChild(card);
                });
            } catch (e) { grid.innerHTML = '<p class="text-white text-center col-span-full">Errore nel caricamento della flotta.</p>'; }
        }

        async function renderExperiences() {
            const grid = document.getElementById('experience-grid');
            grid.innerHTML = '<p class="col-span-full text-center py-10 opacity-50 italic">Caricamento...</p>';
            try {
                const response = await fetch("https://corsproxy.io/?" + encodeURIComponent(SHEET_EXPERIENCE_URL + "&cb=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(r => r.trim() !== '').slice(1);
                grid.innerHTML = '';
                rows.forEach(row => {
                    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 10) return;
                    const titolo = cols[0].replace(/^"|"$/g, '').trim();
                    const desc = cols[2].replace(/^"|"$/g, '').trim();
                    const diff = cols[3].replace(/^"|"$/g, '').trim();
                    const costo = cols[4].replace(/^"|"$/g, '').trim();
                    const cell = cols[6].replace(/^"|"$/g, '').trim();
                    const pers = cols[7].replace(/^"|"$/g, '').trim();
                    const dur = cols[8].replace(/^"|"$/g, '').trim();
                    const img = cols[9].replace(/^"|"$/g, '').trim();
                    const waLink = `https://wa.me/${cell.replace(/\D/g, '')}?text=${encodeURIComponent('Prenotazione: ' + titolo)}`;
                    
                    const card = document.createElement('div');
                    card.className = "exp-card flex flex-col";
                    card.innerHTML = `
                        <div class="relative"><img src="${img}" class="card-img"><div class="absolute top-4 left-4 bg-[#c5a059] text-white text-[10px] font-black px-3 py-1 rounded-lg">€ ${costo}</div></div>
                        <div class="p-6">
                            <h3 class="text-xl font-black uppercase mb-4 italic">${titolo}</h3>
                            <div class="flex gap-2 mb-4">
                                <div class="bg-white/5 p-2 rounded flex items-center gap-2 text-[9px] font-bold"><i data-lucide="clock" class="w-3 h-3 text-[#c5a059]"></i> ${dur}</div>
                                <div class="bg-white/5 p-2 rounded flex items-center gap-2 text-[9px] font-bold"><i data-lucide="users" class="w-3 h-3 text-[#c5a059]"></i> ${pers}</div>
                                <div class="bg-white/5 p-2 rounded flex items-center gap-2 text-[9px] font-bold"><i data-lucide="mountain" class="w-3 h-3 text-[#c5a059]"></i> ${diff}</div>
                            </div>
                            <p class="text-slate-400 text-[11px] mb-6 italic leading-relaxed">\"${desc}\"</p>
                            <a href="${waLink}" target="_blank" class="block bg-white text-slate-900 text-center py-3 rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-[#c5a059] transition-colors">Invia Richiesta</a>
                        </div>`;
                    grid.appendChild(card);
                });
                lucide.createIcons();
            } catch (e) { grid.innerHTML = 'Errore.'; }
        }

        async function init() {
            try {
                const response = await fetch("https://corsproxy.io/?" + encodeURIComponent(SHEET_MANUTENZIONE_URL + "&cb=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).slice(1);
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols.length >= 2) {
                        const s = cols[1].trim().toUpperCase();
                        if(s === "CHIUSO" || s === "MANUTENZIONE") trailStatus[cols[0].trim().toUpperCase()] = true;
                    }
                });
                if (typeof datiSentieri !== 'undefined') {
                    geoJsonLayer = L.geoJSON(datiSentieri);
                    renderList();
                }
            } catch (e) { console.log(e); }
            lucide.createIcons();
        }

        function filterTrails(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('f-' + type).classList.add('active');
            renderList(type);
        }
        function closePanel() { document.getElementById('info-panel').style.display = 'none'; }
        init();
    </script>
</body>
</html>
