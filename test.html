<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Pelagone | Experience Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="SENTIERI.js"></script>
    <script src="POI.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .bg-verde { background-color: #22c55e !important; }
        .bg-blu { background-color: #3b82f6 !important; }
        .bg-rosso { background-color: #ef4444 !important; }
        .bg-nero { background-color: #000000 !important; }
        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #map { flex: 1; position: relative; z-index: 10; }
        .user-dot { background-color: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #sidebar { width: 380px; height: 100%; background: #1e293b; border-right: 1px solid #334155; z-index: 1001; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 768px) {
            #sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70vh; border-right: none; border-radius: 25px 25px 0 0; transform: translateY(calc(100% - 60px)); }
            #sidebar.open { transform: translateY(0); }
            #info-panel { left: 10px !important; right: 10px !important; bottom: 80px !important; width: calc(100% - 20px) !important; }
        }
        @keyframes pathFlash { 0% { opacity: 1; stroke-width: 12; } 50% { opacity: 0.3; stroke-width: 22; } 100% { opacity: 1; stroke-width: 12; } }
        .flash-path { animation: pathFlash 0.5s ease-in-out 6; }
        .filter-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; font-weight: 800; }
        .filter-btn.active { background-color: #c5a059 !important; color: white; border-color: #c5a059; }
        #info-panel { display: none; position: fixed; bottom: 30px; left: 410px; right: 30px; z-index: 2000; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .symbol { width: 12px; height: 12px; display: inline-block; border: 1px solid white; vertical-align: middle; }
        .circle { border-radius: 50%; } .square { border-radius: 2px; } .diamond { transform: rotate(45deg) scale(0.8); }
        #experience-overlay { position: fixed; inset: 0; z-index: 9999; background: #0f172a; overflow-y: auto; display: none; }
        .exp-card { overflow: hidden; border-radius: 1.5rem; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <header class="h-[100px] bg-[#0f172a] border-b border-slate-800 flex items-center justify-between px-4 md:px-6 text-white shrink-0 relative z-[1002]">
        <div class="flex flex-col cursor-pointer" onclick="location.reload()">
            <h1 class="text-xl md:text-2xl font-black text-[#c5a059] uppercase italic leading-tight">Pelagone</h1>
            <span class="text-[7px] tracking-[0.3em] uppercase opacity-60">Experience Hub</span>
        </div>
        <div class="flex bg-slate-800/50 p-1 rounded-full border border-slate-700">
            <button onclick="filterTrails('all')" id="f-all" class="filter-btn active px-3 py-1.5 rounded-full text-[9px] uppercase">Tutti</button>
            <button onclick="filterTrails('easy')" id="f-easy" class="filter-btn px-3 py-1.5 rounded-full text-[9px] uppercase">Easy</button>
            <button onclick="filterTrails('pro')" id="f-pro" class="filter-btn px-3 py-1.5 rounded-full text-[9px] uppercase">Pro</button>
        </div>
        <button onclick="toggleExperiences()" class="bg-[#c5a059] text-white px-4 py-2 rounded-full text-[9px] font-black uppercase shadow-lg shrink-0 active:scale-95 transition-transform">⭐ Prenota</button>
    </header>

    <div id="main-container">
        <aside id="sidebar">
            <div class="md:hidden w-full h-[60px] flex items-center justify-center cursor-pointer border-b border-slate-700 bg-slate-800" onclick="toggleSidebar()">
                <div class="w-12 h-1 bg-slate-500 rounded-full absolute top-3"></div>
                <span class="text-white text-[10px] font-black uppercase tracking-widest mt-2">Sfoglia i Sentieri</span>
            </div>
            <div id="trail-list" class="p-4 space-y-3 overflow-y-auto h-[calc(100%-60px)] md:h-full"></div>
        </aside>
        <main id="map">
            <div id="info-panel">
                <button onclick="closePanel()" class="absolute -top-3 -right-3 bg-white w-8 h-8 rounded-full shadow-lg flex items-center justify-center text-slate-900 font-bold border border-slate-200">✕</button>
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="text-center md:text-left flex-1 w-full">
                        <h2 id="ui-nome" class="text-lg md:text-2xl font-black uppercase text-slate-800 mb-3 italic">Nome Trail</h2>
                        <div class="flex flex-col gap-2">
                            <button id="btn-download" class="bg-blue-600 text-white px-6 py-4 rounded-xl text-[10px] font-black uppercase shadow-md active:scale-95">📂 Scarica GPX</button>
                            <button onclick="initTracking()" class="bg-slate-900 text-white px-6 py-4 rounded-xl text-[10px] font-black uppercase shadow-md active:scale-95">📍 NAVIGA</button>
                        </div>
                    </div>
                    <div id="qr-wrapper" class="hidden md:flex flex-col items-center border-l pl-8"><div id="qrcode" class="bg-white p-2 rounded-lg"></div></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- FUNZIONE GPS ---
        let userMarker = null;
        function initTracking() {
            if (!navigator.geolocation) { alert("Geolocalizzazione non supportata."); return; }
            navigator.geolocation.watchPosition((position) => {
                const latlng = [position.coords.latitude, position.coords.longitude];
                if (!userMarker) {
                    const icon = L.divIcon({ className: 'user-dot', iconSize: [16, 16] });
                    userMarker = L.marker(latlng, { icon: icon }).addTo(map);
                } else { userMarker.setLatLng(latlng); }
            }, null, { enableHighAccuracy: true });
        }

        // --- CODICE ORIGINALE INTEGRATO ---
        const BASE_URL_GPX = "https://orzoro.github.io/resort-experience/gpx/";
        const map = L.map('map', { zoomControl: false }).setView([42.9635639, 10.8630999], 13);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);
        let trailStatus = {};
        let geoJsonLayer;
        const trailTable = { "SANTANSANO": { col: "rosso", sym: "square" }, "COMO HD": { col: "rosso", sym: "square" }, "ROGNOSO": { col: "rosso", sym: "square" }, "DH AIONE": { col: "rosso", sym: "square" }, "CESSA RIGATTAIE": { col: "rosso", sym: "square" }, "AVVOLTORE": { col: "blu", sym: "circle" }, "AINA": { col: "verde", sym: "circle" }, "COMO EASY": { col: "blu", sym: "circle" }, "PRISON BREAK": { col: "nero", sym: "diamond" }, "BUZZINO": { col: "rosso", sym: "square" }, "CERRETELLE": { col: "blu", sym: "circle" } };

        async function init() {
            try {
                const response = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0LjAfvMuepPzsxcOWuAvykxmW16NwcYSIH7vbPdiKulIUOBMTqBXzsR1fGuClt-tB54O5HzLfHZp/pub?gid=0&single=true&output=csv");
                const data = await response.text();
                const rows = data.split(/\r?\n/).slice(1);
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols.length >= 2) {
                        const s = cols[1].trim().toUpperCase();
                        if(s === "CHIUSO" || s === "MANUTENZIONE") trailStatus[cols[0].trim().toUpperCase()] = true;
                    }
                });
                if (typeof datiSentieri !== 'undefined') {
                    geoJsonLayer = L.geoJSON(datiSentieri).addTo(map);
                    renderList();
                }
            } catch (e) { console.log(e); }
        }

        function renderList(filter = 'all') {
            const list = document.getElementById('trail-list');
            if (!list || !geoJsonLayer) return;
            list.innerHTML = '';
            geoJsonLayer.eachLayer(layer => {
                const nome = layer.feature.properties.NOME;
                const nomeKey = nome.toUpperCase().trim();
                const isClosed = trailStatus[nomeKey] === true;
                const cfg = trailTable[nomeKey] || { col: "blu", sym: "circle" };
                const hexMap = { "verde": "#22c55e", "blu": "#3b82f6", "rosso": "#ef4444", "nero": "#000000" };
                const tailBg = { "verde": "bg-verde", "blu": "bg-blu", "rosso": "bg-rosso", "nero": "bg-nero" };
                layer.setStyle({ color: isClosed ? '#f59e0b' : hexMap[cfg.col], weight: 6, dashArray: isClosed ? '5,10' : null });
                if (filter === 'all' || (filter === 'easy' && (cfg.col === 'verde' || cfg.col === 'blu')) || (filter === 'pro' && (cfg.col === 'rosso' || cfg.col === 'nero'))) {
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-xl flex justify-between items-center text-white cursor-pointer transition-all active:scale-95 ${isClosed ? 'bg-amber-600' : tailBg[cfg.col]}`;
                    card.innerHTML = `<span class="font-black uppercase text-[10px]">${isClosed ? '⚠️ ' : ''}${nome}</span><div class="symbol ${cfg.sym} bg-white/20"></div>`;
                    card.onclick = () => {
                        map.fitBounds(layer.getBounds(), { padding: [30, 80] });
                        if(layer.getElement()) {
                            layer.getElement().classList.add('flash-path');
                            setTimeout(() => { if(layer.getElement()) layer.getElement().classList.remove('flash-path'); }, 3000);
                        }
                        document.getElementById('ui-nome').innerText = nome;
                        document.getElementById('info-panel').style.display = 'block';
                        const finalLink = BASE_URL_GPX + nome.toLowerCase().trim().replace(/\s+/g, '_') + ".gpx";
                        if(window.innerWidth > 768) {
                            document.getElementById('qrcode').innerHTML = "";
                            new QRCode(document.getElementById('qrcode'), { text: finalLink, width: 80, height: 80 });
                        }
                        document.getElementById('btn-download').onclick = () => window.open(finalLink, '_blank');
                        if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
                    };
                    list.appendChild(card);
                    layer.addTo(map);
                } else { map.removeLayer(layer); }
            });
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function toggleExperiences() { 
            const o = document.getElementById('experience-overlay');
            const h = (o.style.display === 'none' || o.style.display === '');
            o.style.display = h ? 'block' : 'none';
        }
        function filterTrails(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('f-' + type).classList.add('active');
            renderList(type);
        }
        function closePanel() { document.getElementById('info-panel').style.display = 'none'; }
        
        init();
    </script>
</body>
</html>
