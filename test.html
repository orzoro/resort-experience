<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pelagone Resort | Experience Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="SENTIERI.js"></script>
    <script src="POI.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Layout per Desktop */
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 380px; height: 100%; overflow-y: auto; background: #1e293b; border-right: 1px solid #334155; z-index: 20; }
        #map { flex: 1; position: relative; z-index: 10; }

        /* Responsive per Mobile */
        @media (max-width: 768px) {
            header { height: 80px !important; padding: 0 15px !important; }
            header h1 { font-size: 1.5rem !important; }
            #main-container { flex-direction: column; }
            #sidebar { 
                position: fixed; bottom: 0; left: 0; width: 100%; height: 40vh; 
                z-index: 1000; border-right: none; border-top: 2px solid #c5a059;
                border-radius: 25px 25px 0 0; transform: translateY(0); transition: transform 0.3s ease;
            }
            #sidebar.collapsed { transform: translateY(calc(100% - 40px)); }
            #info-panel { left: 15px !important; right: 15px !important; bottom: 15px !important; padding: 15px !important; }
            #ui-nome { font-size: 1.25rem !important; }
            .filter-btn { padding: 4px 12px !important; font-size: 8px !important; }
        }

        .symbol { width: 14px; height: 14px; display: inline-block; border: 1px solid white; vertical-align: middle; }
        .circle { border-radius: 50%; }
        .square { border-radius: 2px; }
        .diamond { transform: rotate(45deg) scale(0.8); }
        
        #info-panel { display: none; position: fixed; bottom: 30px; left: 410px; right: 30px; z-index: 2000; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .qr-container { background: white; padding: 10px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        
        .filter-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; white-space: nowrap; }
        .filter-btn.active { background-color: #c5a059 !important; color: white; }
        .resort-marker { background: #c5a059; border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; }
        
        /* Card Esperienze Responsive */
        .exp-card { overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .exp-image { width: 100%; height: 180px; object-fit: cover; }
    </style>
</head>
<body>
    <header class="h-[100px] bg-[#0f172a] border-b border-slate-800 flex items-center justify-between px-6 text-white shrink-0">
        <div class="flex flex-col">
            <h1 class="text-2xl font-black tracking-widest text-[#c5a059] uppercase italic">Pelagone</h1>
            <span class="text-[8px] tracking-[0.4em] uppercase opacity-60">Experience Hub</span>
        </div>
        <div class="flex space-x-1 overflow-x-auto pb-1">
            <button onclick="filterTrails('all')" id="f-all" class="filter-btn active bg-slate-800 px-3 py-2 rounded-full text-[9px] font-black uppercase">Tutti</button>
            <button onclick="filterTrails('easy')" id="f-easy" class="filter-btn bg-slate-800 px-3 py-2 rounded-full text-[9px] font-black uppercase">Family</button>
            <button onclick="filterTrails('pro')" id="f-pro" class="filter-btn bg-slate-800 px-3 py-2 rounded-full text-[9px] font-black uppercase">Pro</button>
        </div>
        <button onclick="toggleExperiences()" class="bg-[#c5a059] text-white px-4 py-2 rounded-full text-[9px] font-black uppercase shrink-0">⭐ Prenota</button>
    </header>

    <div id="main-container">
        <aside id="sidebar">
            <div class="md:hidden w-full h-10 flex items-center justify-center border-b border-slate-700 bg-slate-800 sticky top-0" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
                <div class="w-12 h-1.5 bg-slate-500 rounded-full"></div>
            </div>
            <div id="trail-list" class="p-4 space-y-2"></div>
        </aside>

        <main id="map">
            <div id="info-panel">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="text-center md:text-left flex-1">
                        <h2 id="ui-nome" class="text-xl md:text-3xl font-black uppercase text-slate-800 mb-4">Nome Trail</h2>
                        <button id="btn-download" class="bg-blue-600 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase w-full md:w-auto">📂 Scarica GPX</button>
                    </div>
                    <div id="qr-wrapper" class="hidden md:flex flex-col items-center border-l pl-8">
                        <div id="qrcode" class="qr-container"></div>
                    </div>
                    <button onclick="closePanel()" class="absolute top-2 right-4 text-slate-400 text-xl">✕</button>
                </div>
            </div>
        </main>
    </div>

    <div id="experience-overlay" class="fixed inset-0 z-[5000] bg-[#0f172a]/98 hidden p-4 md:p-10 overflow-y-auto">
        <div class="flex justify-between items-center mb-6 max-w-7xl mx-auto text-white">
            <h2 class="text-2xl md:text-4xl font-black uppercase text-[#c5a059]">Esperienze</h2>
            <button onclick="toggleExperiences()" class="text-2xl">✕</button>
        </div>
        <div id="experience-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-7xl mx-auto"></div>
    </div>

    <script>
        // ... (Le costanti BASE_URL_GPX e gli URL dei fogli rimangono identici a prima) ...
        const BASE_URL_GPX = "https://orzoro.github.io/resort-experience/gpx/";
        const SHEET_MANUTENZIONE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0LjAfvMuepPzsxcOWuAvykxmW16NwcYSIH7vbPdiKulIUOBMTqBXzsR1fGuClt-tB54O5HzLfHZp/pub?gid=0&single=true&output=csv";
        const SHEET_EXPERIENCE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTROGsq0FZj3cnpRrqco8JWrjUt4I_d9b1aU1sF5TKrC7474hbQ1d8BtwNibjZFjPlnoplVPSwVw3vu/pub?gid=0&single=true&output=csv";

        const map = L.map('map', { zoomControl: false }).setView([42.9635639, 10.8630999], 13);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

        let trailStatus = {};
        let geoJsonLayer, lastLayer = null;

        const trailTable = {
            "SANTANSANO": { col: "rosso", sym: "square" }, "COMO HD": { col: "rosso", sym: "square" }, "ROGNOSO": { col: "rosso", sym: "square" },
            "DH AIONE": { col: "rosso", sym: "square" }, "CESSA RIGATTAIE": { col: "rosso", sym: "square" }, "AVVOLTORE": { col: "blu", sym: "circle" },
            "AINA": { col: "verde", sym: "circle" }, "COMO EASY": { col: "blu", sym: "circle" }, "PRISON BREAK": { col: "nero", sym: "diamond" }, "BUZZINO": { col: "rosso", sym: "square" },
            "CERRETELLE": { col: "blu", sym: "circle" }
        };

        // ... (Qui inserisci le funzioni caricaDatiManutenzione() e renderExperiences() che abbiamo già scritto) ...
        // Importante: Nella funzione renderList(), aggiungi la chiusura automatica della sidebar su mobile quando si clicca un sentiero
        
        function renderList(filter = 'all') {
            const list = document.getElementById('trail-list');
            if (!list || !geoJsonLayer) return;
            list.innerHTML = '';
            geoJsonLayer.eachLayer(layer => {
                const nome = layer.feature.properties.NOME;
                const nomeKey = nome.toUpperCase().trim();
                const isClosed = trailStatus[nomeKey] === true;
                const cfg = trailTable[nomeKey] || { col: "blu", sym: "circle" };
                const hexMap = { "verde": "#22c55e", "blu": "#3b82f6", "rosso": "#ef4444", "nero": "#000000" };
                const tailBg = { "verde": "bg-verde", "blu": "bg-blu", "rosso": "bg-rosso", "nero": "bg-nero" };
                
                layer.setStyle({ color: isClosed ? '#f59e0b' : hexMap[cfg.col], weight: 6 });

                if (filter === 'all' || (filter === 'easy' && (cfg.col === 'verde' || cfg.col === 'blu')) || (filter === 'pro' && (cfg.col === 'rosso' || cfg.col === 'nero'))) {
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-xl flex justify-between items-center text-white cursor-pointer ${isClosed ? 'bg-amber-600' : tailBg[cfg.col]}`;
                    card.innerHTML = `<span class="font-black uppercase text-[10px] leading-none">${nome}</span><div class="symbol ${cfg.sym} bg-white/20"></div>`;
                    
                    card.onclick = () => {
                        map.fitBounds(layer.getBounds(), { padding: [50, 50] });
                        document.getElementById('ui-nome').innerText = nome;
                        document.getElementById('info-panel').style.display = 'block';
                        
                        const nomeFileGPX = nome.toLowerCase().trim().replace(/\s+/g, '_') + ".gpx";
                        const finalLink = BASE_URL_GPX + nomeFileGPX;

                        if(window.innerWidth > 768) {
                            document.getElementById('qrcode').innerHTML = "";
                            new QRCode(document.getElementById('qrcode'), { text: finalLink, width: 100, height: 100 });
                        }

                        document.getElementById('btn-download').onclick = () => { window.open(finalLink, '_blank'); };
                        
                        // SU MOBILE: Chiude la lista dopo il clic
                        if(window.innerWidth <= 768) {
                            document.getElementById('sidebar').classList.add('collapsed');
                        }
                    };
                    list.appendChild(card);
                    layer.addTo(map);
                } else { map.removeLayer(layer); }
            });
        }

        async function caricaDatiManutenzione() {
            try {
                const proxyUrl = "https://corsproxy.io/?";
                const response = await fetch(proxyUrl + encodeURIComponent(SHEET_MANUTENZIONE_URL + "&cb=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(row => row.trim() !== '').slice(1);
                trailStatus = {};
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols.length >= 2) {
                        const nome = cols[0].trim().toUpperCase();
                        const stato = cols[1].trim().toUpperCase();
                        if (stato === "CHIUSO" || stato === "MANUTENZIONE") trailStatus[nome] = true;
                    }
                });
                if (typeof datiSentieri !== 'undefined') {
                    if (geoJsonLayer) map.removeLayer(geoJsonLayer);
                    geoJsonLayer = L.geoJSON(datiSentieri);
                    renderList();
                }
            } catch (e) { console.error(e); }
        }

        async function renderExperiences() {
            const grid = document.getElementById('experience-grid');
            grid.innerHTML = '<p class="text-white text-center col-span-full">Caricamento...</p>';
            try {
                const proxyUrl = "https://corsproxy.io/?";
                const response = await fetch(proxyUrl + encodeURIComponent(SHEET_EXPERIENCE_URL + "&cb=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(row => row.trim() !== '').slice(1);
                grid.innerHTML = '';
                rows.forEach(row => {
                    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 10) return;
                    const titolo = cols[0].replace(/^"|"$/g, '').trim();
                    const desc = cols[2].replace(/^"|"$/g, '').trim();
                    const costo = cols[4].replace(/^"|"$/g, '').trim();
                    const cell = cols[6].replace(/^"|"$/g, '').trim();
                    const imgUrl = (cols[9] || "").replace(/^"|"$/g, '').trim();
                    const cleanCell = cell.replace(/\D/g, '');
                    const waLink = `https://wa.me/${cleanCell.startsWith('39') ? cleanCell : '39'+cleanCell}?text=Info per ${titolo}`;
                    
                    const card = document.createElement('div');
                    card.className = "exp-card rounded-2xl flex flex-col bg-[#1e293b]";
                    card.innerHTML = `<img src="${imgUrl}" class="exp-image"><div class="p-6 flex-1 flex flex-col justify-between"><h3 class="text-white font-black uppercase mb-2 leading-none">${titolo}</h3><p class="text-slate-400 text-xs italic mb-4 leading-relaxed">${desc}</p><a href="${waLink}" target="_blank" class="bg-[#c5a059] text-white text-center py-3 rounded-xl font-black uppercase text-[9px]">Prenota</a></div>`;
                    grid.appendChild(card);
                });
            } catch (e) { grid.innerHTML = 'Errore dati.'; }
        }

        function toggleExperiences() { document.getElementById('experience-overlay').classList.toggle('hidden'); if(!document.getElementById('experience-overlay').classList.contains('hidden')) renderExperiences(); }
        function filterTrails(type) { document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('f-' + type).classList.add('active'); renderList(type); }
        function closePanel() { document.getElementById('info-panel').style.display = 'none'; }
        
        caricaDatiManutenzione();
    </script>
</body>
</html>
