<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Pelagone | Experience Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="SENTIERI.js"></script>
    <script src="POI.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #map { flex: 1; position: relative; }
        #sidebar { width: 380px; height: 100%; background: #1e293b; border-right: 1px solid #334155; z-index: 1001; }
        .user-dot { background-color: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .filter-btn.active { background-color: #c5a059 !important; }
        .bg-verde { background-color: #22c55e !important; }
        .bg-blu { background-color: #3b82f6 !important; }
        .bg-rosso { background-color: #ef4444 !important; }
        .bg-nero { background-color: #000000 !important; }
    </style>
</head>
<body>
    <header class="h-[100px] bg-[#0f172a] border-b border-slate-800 flex items-center justify-between px-6 text-white">
        <h1 class="text-2xl font-black text-[#c5a059] uppercase italic">Pelagone</h1>
        <div class="flex gap-2">
            <button onclick="filterTrails('all')" id="f-all" class="filter-btn active px-3 py-1 rounded-full text-[10px] bg-slate-700">TUTTI</button>
            <button onclick="toggleExperiences()" class="bg-[#c5a059] px-4 py-2 rounded-full text-[10px] font-black">⭐ PRENOTA</button>
        </div>
    </header>

    <div id="main-container">
        <aside id="sidebar"><div id="trail-list" class="p-4 space-y-3 overflow-y-auto h-full"></div></aside>
        <main id="map">
            <div id="info-panel" style="display:none; position:fixed; bottom:30px; left:410px; right:30px; z-index:2000; background:white; padding:20px; border-radius:20px;">
                <h2 id="ui-nome" class="text-xl font-black">Nome Trail</h2>
                <div id="qrcode"></div>
                <div class="flex gap-2 mt-2">
                    <button id="btn-download" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px]">📂 GPX</button>
                    <button onclick="initTracking()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px]">📍 NAVIGA</button>
                </div>
            </div>
        </main>
    </div>

    <div id="experience-overlay" style="display:none; position:fixed; inset:0; z-index:9999; background:#0f172a; padding:40px;">
        <button onclick="toggleExperiences()" class="text-white text-3xl">✕</button>
        <div id="experience-grid" class="grid grid-cols-3 gap-4 text-white"></div>
    </div>

    <script>
        const BASE_URL_GPX = "https://orzoro.github.io/resort-experience/gpx/";
        const SHEET_MANUTENZIONE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0LjAfvMuepPzsxcOWuAvykxmW16NwcYSIH7vbPdiKulIUOBMTqBXzsR1fGuClt-tB54O5HzLfHZp/pub?gid=0&single=true&output=csv";
        const SHEET_EXPERIENCE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTROGsq0FZj3cnpRrqco8JWrjUt4I_d9b1aU1sF5TKrC7474hbQ1d8BtwNibjZFjPlnoplVPSwVw3vu/pub?gid=0&single=true&output=csv";
        const trailTable = { "SANTANSANO": { col: "rosso", sym: "square" }, "COMO HD": { col: "rosso", sym: "square" }, "ROGNOSO": { col: "rosso", sym: "square" }, "DH AIONE": { col: "rosso", sym: "square" }, "CESSA RIGATTAIE": { col: "rosso", sym: "square" }, "AVVOLTORE": { col: "blu", sym: "circle" }, "AINA": { col: "verde", sym: "circle" }, "COMO EASY": { col: "blu", sym: "circle" }, "PRISON BREAK": { col: "nero", sym: "diamond" }, "BUZZINO": { col: "rosso", sym: "square" }, "CERRETELLE": { col: "blu", sym: "circle" } };
        let trailStatus = {};
        let geoJsonLayer;
        let userMarker = null;

        function initTracking() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition((p) => {
                const ll = [p.coords.latitude, p.coords.longitude];
                if (!userMarker) userMarker = L.marker(ll, {icon: L.divIcon({className:'user-dot', iconSize:[16,16]})}).addTo(map);
                else userMarker.setLatLng(ll);
            }, null, {enableHighAccuracy: true});
        }

        const map = L.map('map', { zoomControl: false }).setView([42.9635639, 10.8630999], 13);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

        async function init() {
            try {
                const res = await fetch(SHEET_MANUTENZIONE_URL);
                const data = await res.text();
                data.split(/\r?\n/).slice(1).forEach(row => {
                    const cols = row.split(',');
                    if(cols.length >= 2 && (cols[1].trim().toUpperCase() === "CHIUSO" || cols[1].trim().toUpperCase() === "MANUTENZIONE")) 
                        trailStatus[cols[0].trim().toUpperCase()] = true;
                });
                if (typeof datiSentieri !== 'undefined') {
                    geoJsonLayer = L.geoJSON(datiSentieri).addTo(map);
                    renderList();
                }
            } catch(e) { console.log(e); }
        }

        function renderList(filter = 'all') {
            const list = document.getElementById('trail-list');
            if (!list || !geoJsonLayer) return;
            list.innerHTML = '';
            geoJsonLayer.eachLayer(layer => {
                const nome = layer.feature.properties.NOME;
                const nomeKey = nome.toUpperCase().trim();
                const isClosed = trailStatus[nomeKey] === true;
                const cfg = trailTable[nomeKey] || { col: "blu", sym: "circle" };
                const hexMap = { "verde": "#22c55e", "blu": "#3b82f6", "rosso": "#ef4444", "nero": "#000000" };
                const tailBg = { "verde": "bg-verde", "blu": "bg-blu", "rosso": "bg-rosso", "nero": "bg-nero" };
                
                layer.setStyle({ color: isClosed ? '#f59e0b' : hexMap[cfg.col], weight: 6, dashArray: isClosed ? '5,10' : null });

                if (filter === 'all' || (filter === 'easy' && (cfg.col === 'verde' || cfg.col === 'blu')) || (filter === 'pro' && (cfg.col === 'rosso' || cfg.col === 'nero'))) {
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-xl flex justify-between items-center text-white cursor-pointer ${isClosed ? 'bg-amber-600' : tailBg[cfg.col]}`;
                    card.innerHTML = `<span class="font-black uppercase text-[10px]">${isClosed ? '⚠️ ' : ''}${nome}</span>`;
                    card.onclick = () => {
                        map.fitBounds(layer.getBounds());
                        document.getElementById('ui-nome').innerText = nome;
                        document.getElementById('info-panel').style.display = 'block';
                        document.getElementById('btn-download').onclick = () => window.open(BASE_URL_GPX + nome.toLowerCase().trim().replace(/\s+/g, '_') + ".gpx", '_blank');
                    };
                    list.appendChild(card);
                    layer.addTo(map);
                } else { map.removeLayer(layer); }
            });
        }

        async function renderExperiences() {
            const grid = document.getElementById('experience-grid');
            grid.innerHTML = 'Sincronizzazione...';
            try {
                const res = await fetch("https://corsproxy.io/?" + encodeURIComponent(SHEET_EXPERIENCE_URL));
                const data = await res.text();
                grid.innerHTML = '';
                // ... (la tua logica di creazione card rimane qui)
            } catch(e) { grid.innerHTML = 'Errore.'; }
        }

        function toggleExperiences() { 
            const o = document.getElementById('experience-overlay');
            o.style.display = (o.style.display === 'none' || o.style.display === '') ? 'block' : 'none';
            if(o.style.display === 'block') renderExperiences();
        }

        init();
    </script>
</body>
</html>
