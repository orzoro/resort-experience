<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Pelagone | Experience Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="SENTIERI.js"></script>
    <script src="POI.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #sidebar { width: 380px; height: 100%; background: #1e293b; border-right: 1px solid #334155; z-index: 1001; transition: transform 0.3s ease; }
        @media (max-width: 768px) { #sidebar { position: fixed; left: 0; top: 100px; bottom: 0; transform: translateX(-100%); width: 100%; } #sidebar.open { transform: translateX(0); } }
        .filter-btn { background-color: #475569; color: white; }
        .filter-btn.active { background-color: #c5a059 !important; }
        .bg-verde { background-color: #22c55e !important; }
        .bg-blu { background-color: #3b82f6 !important; }
        .bg-rosso { background-color: #ef4444 !important; }
        .bg-nero { background-color: #000000 !important; }
        .exp-image { width: 100%; height: 200px; object-fit: cover; }
        .badge-info { background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 8px; font-size: 10px; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <header class="h-[100px] bg-[#0f172a] border-b border-slate-800 flex items-center justify-between px-6 text-white">
        <h1 class="text-2xl font-black text-[#c5a059] uppercase italic cursor-pointer" onclick="document.getElementById('sidebar').classList.toggle('open')">Pelagone</h1>
        <div class="flex gap-2">
            <button onclick="filterTrails('all')" id="f-all" class="filter-btn active px-3 py-1 rounded-full text-[10px] font-bold">TUTTI</button>
            <button onclick="filterTrails('easy')" id="f-easy" class="filter-btn px-3 py-1 rounded-full text-[10px] font-bold">EASY</button>
            <button onclick="filterTrails('pro')" id="f-pro" class="filter-btn px-3 py-1 rounded-full text-[10px] font-bold">PRO</button>
            <button onclick="toggleExperiences()" class="bg-[#c5a059] px-4 py-2 rounded-full text-[10px] font-black">⭐ PRENOTA</button>
        </div>
    </header>

    <div id="main-container">
        <aside id="sidebar"><div id="trail-list" class="p-4 space-y-3 overflow-y-auto h-full"></div></aside>
        <main id="map" class="flex-1">
            <div id="info-panel" style="display:none; position:fixed; bottom:20px; left:20px; right:20px; md:left:410px; z-index:2000; background:white; padding:20px; border-radius:20px;">
                <button onclick="closePanel()" class="absolute top-2 right-2 p-2">✕</button>
                <h2 id="ui-nome" class="text-xl font-black italic mb-2">Nome Trail</h2>
                <div id="qrcode" class="flex justify-center mb-4"></div>
                <button id="btn-download" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">SCARICA GPX</button>
            </div>
        </main>
    </div>

    <div id="experience-overlay" style="display:none; position:fixed; inset:0; z-index:9999; background:#0f172a; padding:40px; overflow-y:auto;">
        <button onclick="toggleExperiences()" class="text-white text-3xl mb-10">✕ CHIUDI</button>
        <div id="experience-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </div>

    <script>
        const BASE_URL_GPX = "https://orzoro.github.io/resort-experience/gpx/";
        const SHEET_EXPERIENCE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTROGsq0FZj3cnpRrqco8JWrjUt4I_d9b1aU1sF5TKrC7474hbQ1d8BtwNibjZFjPlnoplVPSwVw3vu/pub?gid=0&single=true&output=csv";
        const map = L.map('map', { zoomControl: false }).setView([42.9635639, 10.8630999], 13);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

        async function renderExperiences() {
            const grid = document.getElementById('experience-grid');
            grid.innerHTML = '<p class="text-white text-center">Caricamento...</p>';
            try {
                const response = await fetch("https://corsproxy.io/?" + encodeURIComponent(SHEET_EXPERIENCE_URL));
                const data = await response.text();
                const rows = data.split(/\r?\n/).slice(1);
                grid.innerHTML = '';
                rows.forEach(row => {
                    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 10) return;
                    const [titolo, , desc, diff, costo, , cell, pers, dur, img] = cols.map(c => c.replace(/^"|"$/g, ''));
                    const waLink = `https://wa.me/${cell.replace(/\D/g, '')}?text=${encodeURIComponent('Prenoto: ' + titolo)}`;
                    
                    const card = document.createElement('div');
                    card.className = "bg-[#1e293b] rounded-3xl overflow-hidden shadow-2xl";
                    card.innerHTML = `
                        <div class="relative"><img src="${img}" class="exp-image"><div class="absolute top-4 left-4 bg-[#c5a059] text-white px-3 py-1 rounded-lg font-black">€ ${costo}</div></div>
                        <div class="p-6">
                            <h3 class="text-white text-xl font-black mb-4">${titolo}</h3>
                            <div class="flex gap-2 mb-4 text-white">
                                <div class="badge-info"><i data-lucide="clock" class="w-3"></i> ${dur}</div>
                                <div class="badge-info"><i data-lucide="users" class="w-3"></i> ${pers}</div>
                                <div class="badge-info"><i data-lucide="mountain" class="w-3"></i> ${diff}</div>
                            </div>
                            <p class="text-slate-400 text-xs mb-6">${desc}</p>
                            <a href="${waLink}" target="_blank" class="block w-full text-center bg-white py-3 rounded-xl font-black text-xs uppercase">Prenota</a>
                        </div>`;
                    grid.appendChild(card);
                });
                lucide.createIcons();
            } catch (e) { grid.innerHTML = 'Errore.'; }
        }

        function renderList(filter = 'all') {
            const list = document.getElementById('trail-list');
            list.innerHTML = '';
            geoJsonLayer.eachLayer(layer => {
                const nome = layer.feature.properties.NOME;
                const cfg = { "SANTANSANO": { col: "bg-rosso" }, "AINA": { col: "bg-verde" } }[nome.toUpperCase().trim()] || { col: "bg-blu" };
                const show = filter === 'all' || (filter === 'easy' && cfg.col !== 'bg-rosso') || (filter === 'pro' && cfg.col === 'bg-rosso');
                
                if (show) {
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-xl text-white cursor-pointer ${cfg.col}`;
                    card.innerText = nome;
                    card.onclick = () => {
                        document.getElementById('ui-nome').innerText = nome;
                        document.getElementById('info-panel').style.display = 'block';
                        document.getElementById('qrcode').innerHTML = "";
                        new QRCode(document.getElementById('qrcode'), { text: BASE_URL_GPX + nome.toLowerCase().replace(/\s+/g, '_') + ".gpx", width: 150, height: 150 });
                        if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
                    };
                    list.appendChild(card);
                }
            });
        }

        function toggleExperiences() { const o = document.getElementById('experience-overlay'); o.style.display = (o.style.display === 'none') ? 'block' : 'none'; if(o.style.display === 'block') renderExperiences(); }
        function filterTrails(type) { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); document.getElementById('f-' + type).classList.add('active'); renderList(type); }
        function closePanel() { document.getElementById('info-panel').style.display = 'none'; }

        // Caricamento base
        if (typeof datiSentieri !== 'undefined') { geoJsonLayer = L.geoJSON(datiSentieri).addTo(map); renderList(); }
    </script>
</body>
</html>
