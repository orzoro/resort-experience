<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pelagone Resort | Experience Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="SENTIERI.js"></script>
    <script src="POI.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .bg-verde { background-color: #22c55e !important; }
        .bg-blu { background-color: #3b82f6 !important; }
        .bg-rosso { background-color: #ef4444 !important; }
        .bg-nero { background-color: #000000 !important; }

        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #sidebar { width: 380px; height: 100%; overflow-y: auto; background: #1e293b; border-right: 1px solid #334155; z-index: 1001; transition: transform 0.3s ease; }
        #map { flex: 1; position: relative; z-index: 10; }

        @media (max-width: 768px) {
            #sidebar { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            #info-panel { left: 10px !important; right: 10px !important; bottom: 20px !important; width: calc(100% - 20px) !important; }
        }

        /* Animazione Lampeggio */
        @keyframes pathFlash {
            0% { opacity: 1; stroke-width: 12; }
            50% { opacity: 0.3; stroke-width: 16; }
            100% { opacity: 1; stroke-width: 12; }
        }
        .flash-path { animation: pathFlash 0.5s ease-in-out 6; }

        .symbol { width: 12px; height: 12px; display: inline-block; border: 1px solid white; vertical-align: middle; }
        .circle { border-radius: 50%; }
        .square { border-radius: 2px; }
        .diamond { transform: rotate(45deg) scale(0.8); }
        
        #info-panel { display: none; position: fixed; bottom: 30px; left: 410px; right: 30px; z-index: 2000; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        
        .filter-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
        .filter-btn.active { background-color: #c5a059 !important; color: white; }
        
        #experience-overlay { position: fixed; inset: 0; z-index: 9999; background: #0f172a; overflow-y: auto; display: none; }
        .exp-card { border-radius: 1.5rem; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .badge-info { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; color: #f8fafc; display: flex; align-items: center; gap: 8px; }
        .badge-info i { width: 14px; height: 14px; color: #c5a059; }
    </style>
</head>
<body>
    <header class="h-[80px] md:h-[100px] bg-[#0f172a] border-b border-slate-800 flex items-center justify-between px-4 md:px-6 text-white shrink-0 relative z-[1002]">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="md:hidden p-2 bg-slate-800 rounded-lg">
                <i data-lucide="menu" class="w-6 h-6 text-[#c5a059]"></i>
            </button>
            <div class="flex flex-col cursor-pointer" onclick="location.reload()">
                <h1 class="text-lg md:text-2xl font-black text-[#c5a059] uppercase italic leading-tight">Pelagone</h1>
                <span class="text-[7px] tracking-[0.3em] uppercase opacity-60">Experience Hub</span>
            </div>
        </div>
        <button onclick="toggleExperiences()" class="bg-[#c5a059] text-white px-4 py-2 rounded-full text-[9px] font-black uppercase shadow-lg">⭐ Esperienze</button>
    </header>

    <div id="main-container">
        <aside id="sidebar">
            <div class="p-4 border-b border-slate-700 bg-slate-800/50 flex justify-between items-center">
                <span class="text-white text-[10px] font-black uppercase tracking-widest">Esplora i Sentieri</span>
                <div class="flex gap-1">
                    <button onclick="filterTrails('easy')" id="f-easy" class="filter-btn bg-slate-700 px-2 py-1 rounded text-[8px] uppercase">Easy</button>
                    <button onclick="filterTrails('pro')" id="f-pro" class="filter-btn bg-slate-700 px-2 py-1 rounded text-[8px] uppercase">Pro</button>
                </div>
            </div>
            <div id="trail-list" class="p-4 space-y-3"></div>
        </aside>

        <main id="map">
            <div id="info-panel">
                <button onclick="closePanel()" class="absolute -top-3 -right-3 bg-white w-8 h-8 rounded-full shadow-lg flex items-center justify-center text-slate-900 font-bold border border-slate-200">✕</button>
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="text-center md:text-left flex-1 w-full">
                        <h2 id="ui-nome" class="text-lg md:text-2xl font-black uppercase text-slate-800 mb-3 leading-tight">Seleziona Trail</h2>
                        <button id="btn-download" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-xl text-[10px] font-black uppercase w-full md:w-auto shadow-md active:scale-95 transition-all">📂 Scarica Traccia GPX</button>
                    </div>
                    <div id="qr-wrapper" class="hidden md:flex flex-col items-center border-l pl-8">
                        <div id="qrcode" class="qr-container"></div>
                        <span class="text-[8px] uppercase font-bold mt-2 text-slate-400">Scansiona per mobile</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="experience-overlay" class="p-4 md:p-10">
        <div class="sticky top-0 bg-[#0f172a] py-4 mb-6 border-b border-white/10 flex justify-between items-center z-[10001]">
            <h2 class="text-xl md:text-4xl font-black uppercase text-[#c5a059] italic">Weekly Experiences</h2>
            <button onclick="toggleExperiences()" class="text-white p-2">✕</button>
        </div>
        <div id="experience-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-7xl mx-auto pb-20 text-white"></div>
    </div>

    <script>
        const BASE_URL_GPX = "https://orzoro.github.io/resort-experience/gpx/";
        const SHEET_MANUTENZIONE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0LjAfvMuepPzsxcOWuAvykxmW16NwcYSIH7vbPdiKulIUOBMTqBXzsR1fGuClt-tB54O5HzLfHZp/pub?gid=0&single=true&output=csv";
        const SHEET_EXPERIENCE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTROGsq0FZj3cnpRrqco8JWrjUt4I_d9b1aU1sF5TKrC7474hbQ1d8BtwNibjZFjPlnoplVPSwVw3vu/pub?gid=0&single=true&output=csv";

        const map = L.map('map', { zoomControl: false }).setView([42.963, 10.863], 13);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

        let trailStatus = {};
        let geoJsonLayer;

        const trailTable = {
            "SANTANSANO": { col: "rosso", sym: "square" }, "COMO HD": { col: "rosso", sym: "square" }, "ROGNOSO": { col: "rosso", sym: "square" },
            "DH AIONE": { col: "rosso", sym: "square" }, "CESSA RIGATTAIE": { col: "rosso", sym: "square" }, "AVVOLTORE": { col: "blu", sym: "circle" },
            "AINA": { col: "verde", sym: "circle" }, "COMO EASY": { col: "blu", sym: "circle" }, "PRISON BREAK": { col: "nero", sym: "diamond" }, "BUZZINO": { col: "rosso", sym: "square" },
            "CERRETELLE": { col: "blu", sym: "circle" }
        };

        function renderList(filter = 'all') {
            const list = document.getElementById('trail-list');
            if (!list || !geoJsonLayer) return;
            list.innerHTML = '';
            geoJsonLayer.eachLayer(layer => {
                const nome = layer.feature.properties.NOME;
                const nomeKey = nome.toUpperCase().trim();
                const isClosed = trailStatus[nomeKey] === true;
                const cfg = trailTable[nomeKey] || { col: "blu", sym: "circle" };
                const tailBg = { "verde": "bg-verde", "blu": "bg-blu", "rosso": "bg-rosso", "nero": "bg-nero" };
                
                layer.setStyle({ color: isClosed ? '#f59e0b' : (cfg.col==='verde'?'#22c55e':cfg.col==='blu'?'#3b82f6':cfg.col==='rosso'?'#ef4444':'#000'), weight: 6, dashArray: isClosed ? '5,10' : null });

                if (filter === 'all' || (filter === 'easy' && (cfg.col === 'verde' || cfg.col === 'blu')) || (filter === 'pro' && (cfg.col === 'rosso' || cfg.col === 'nero'))) {
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-xl flex justify-between items-center text-white cursor-pointer shadow-md active:scale-95 transition-all ${isClosed ? 'bg-amber-600' : tailBg[cfg.col]}`;
                    card.innerHTML = `<span class="font-black uppercase text-[10px]">${isClosed ? '⚠️ ' : ''}${nome}</span><div class="symbol ${cfg.sym} bg-white/20"></div>`;
                    
                    card.onclick = () => {
                        map.fitBounds(layer.getBounds(), { padding: [30, 30] });
                        if(layer.getElement()) {
                            layer.getElement().classList.add('flash-path');
                            setTimeout(() => layer.getElement().classList.remove('flash-path'), 3000);
                        }
                        document.getElementById('ui-nome').innerText = nome;
                        document.getElementById('info-panel').style.display = 'block';
                        const finalLink = BASE_URL_GPX + nome.toLowerCase().trim().replace(/\s+/g, '_') + ".gpx";
                        document.getElementById('btn-download').onclick = () => window.open(finalLink, '_blank');
                        
                        // Mobile: chiudi sidebar dopo selezione
                        if(window.innerWidth <= 768) toggleSidebar();
                    };
                    list.appendChild(card);
                    layer.addTo(map);
                } else { map.removeLayer(layer); }
            });
        }

        async function renderExperiences() {
            const grid = document.getElementById('experience-grid');
            grid.innerHTML = '<p class="text-white opacity-50 text-center col-span-full">Caricamento...</p>';
            try {
                const proxyUrl = "https://corsproxy.io/?";
                const response = await fetch(proxyUrl + encodeURIComponent(SHEET_EXPERIENCE_URL + "&cb=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(row => row.trim() !== '').slice(1);
                grid.innerHTML = '';
                
                rows.forEach(row => {
                    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 10) return;
                    const titolo = cols[0].replace(/^"|"$/g, '').trim(); 
                    const desc = cols[2].replace(/^"|"$/g, '').trim(); 
                    const diff = cols[3].replace(/^"|"$/g, '').trim(); // D -> Montagna
                    const costo = cols[4].replace(/^"|"$/g, '').trim(); 
                    const cell = cols[6].replace(/^"|"$/g, '').trim(); 
                    const pers = cols[7].replace(/^"|"$/g, '').trim(); // H -> Omini
                    const dura = cols[8].replace(/^"|"$/g, '').trim(); // I -> Orologio
                    const img = (cols[9] || "").replace(/^"|"$/g, '').trim(); 
                    
                    const waLink = `https://wa.me/39${cell.replace(/\D/g, '')}?text=Prenotazione: ${titolo}`;
                    
                    const card = document.createElement('div');
                    card.className = "exp-card flex flex-col";
                    card.innerHTML = `
                        <div class="h-48 relative"><img src="${img}" class="w-full h-full object-cover"><div class="absolute top-3 left-3 bg-[#c5a059] text-white text-[10px] font-bold px-2 py-1 rounded">€ ${costo}</div></div>
                        <div class="p-5 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="text-white font-black uppercase text-lg mb-4 leading-tight italic">${titolo}</h3>
                                <div class="flex flex-wrap gap-2 mb-4">
                                    <div class="badge-info"><i data-lucide="clock"></i> ${dura}</div>
                                    <div class="badge-info"><i data-lucide="users"></i> ${pers}</div>
                                    <div class="badge-info"><i data-lucide="mountain"></i> ${diff}</div>
                                </div>
                                <p class="text-slate-400 text-[10px] italic leading-relaxed border-l-2 border-[#c5a059] pl-3">"${desc}"</p>
                            </div>
                            <a href="${waLink}" target="_blank" class="mt-6 bg-white text-slate-900 text-center py-3 rounded-xl font-black uppercase text-[9px] tracking-widest active:bg-[#c5a059] active:text-white transition-all">Prenota Ora</a>
                        </div>`;
                    grid.appendChild(card);
                });
                lucide.createIcons();
            } catch (e) { grid.innerHTML = 'Errore.'; }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function toggleExperiences() { 
            const overlay = document.getElementById('experience-overlay');
            overlay.style.display = (overlay.style.display === 'none' || overlay.style.display === '') ? 'block' : 'none';
            if(overlay.style.display === 'block') renderExperiences();
        }
        function closePanel() { document.getElementById('info-panel').style.display = 'none'; }
        function filterTrails(type) { renderList(type); }

        async function init() {
            try {
                const proxyUrl = "https://corsproxy.io/?";
                const response = await fetch(proxyUrl + encodeURIComponent(SHEET_MANUTENZIONE_URL + "&cb=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).slice(1);
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols.length >= 2 && (cols[1].trim().toUpperCase() === "CHIUSO" || cols[1].trim().toUpperCase() === "MANUTENZIONE")) {
                        trailStatus[cols[0].trim().toUpperCase()] = true;
                    }
                });
                if (typeof datiSentieri !== 'undefined') {
                    geoJsonLayer = L.geoJSON(datiSentieri);
                    renderList();
                }
            } catch (e) { console.log(e); }
            lucide.createIcons();
        }
        init();
    </script>
</body>
</html>
