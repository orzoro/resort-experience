<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Pelagone | Experience & Bike Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="SENTIERI.js"></script>
    <script src="POI.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #map { flex: 1; position: relative; z-index: 10; }

        #sidebar { 
            width: 380px; height: 100%; background: #1e293b; border-right: 1px solid #334155; 
            z-index: 1001; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        @media (max-width: 768px) {
            #sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70vh; border-radius: 25px 25px 0 0; transform: translateY(calc(100% - 60px)); }
            #sidebar.open { transform: translateY(0); }
        }

        #info-panel { display: none; position: fixed; bottom: 30px; left: 410px; right: 30px; z-index: 2000; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }

        #experience-overlay, #rental-overlay { position: fixed; inset: 0; z-index: 9999; background: #0f172a; overflow-y: auto; display: none; }
        .rent-card { background: #1e293b; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; transition: all 0.3s; }
        .rent-card:hover { transform: translateY(-5px); border-color: #c5a059; }
    </style>
</head>
<body>
    <header class="h-[100px] bg-[#0f172a] border-b border-slate-800 flex items-center justify-between px-6 text-white relative z-[1002]">
        <div class="flex flex-col cursor-pointer" onclick="location.reload()">
            <h1 class="text-2xl font-black text-[#c5a059] uppercase italic leading-tight">Pelagone</h1>
            <span class="text-[7px] tracking-[0.3em] uppercase opacity-60 text-white">Experience Hub</span>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleOverlay('rental')" class="bg-slate-700 text-white px-5 py-2.5 rounded-full text-[10px] font-black uppercase transition-all active:scale-95 border border-slate-600">🚲 Noleggio</button>
            <button onclick="toggleOverlay('experience')" class="bg-[#c5a059] text-white px-5 py-2.5 rounded-full text-[10px] font-black uppercase shadow-lg transition-all active:scale-95">⭐ Prenota</button>
        </div>
    </header>

    <div id="main-container">
        <aside id="sidebar">
            <div id="trail-list" class="p-4 space-y-3 overflow-y-auto h-full"></div>
        </aside>
        <main id="map">
            <div id="info-panel">
                <button onclick="closePanel()" class="absolute -top-3 -right-3 bg-white w-8 h-8 rounded-full shadow-lg flex items-center justify-center text-slate-900 font-bold border border-slate-200">✕</button>
                <h2 id="ui-nome" class="text-2xl font-black uppercase text-slate-800 italic mb-2">Trail</h2>
                <div id="smart-bike-box" class="mb-4 bg-slate-100 p-3 rounded-xl border-l-4 border-[#c5a059] hidden">
                    <p id="smart-bike-text" class="text-[11px] font-black text-slate-800 uppercase italic"></p>
                </div>
                <button id="btn-download" class="bg-blue-600 text-white px-6 py-4 rounded-xl text-[10px] font-black uppercase w-full shadow-md active:scale-95">📂 Scarica GPX</button>
            </div>
        </main>
    </div>

    <div id="rental-overlay" class="p-6 md:p-12">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
                <h2 class="text-3xl md:text-5xl font-black uppercase text-[#c5a059] italic">Bike Rental</h2>
                <button onclick="toggleOverlay('rental')" class="text-white text-4xl">✕</button>
            </div>
            <div id="rental-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20"></div>
        </div>
    </div>

    <script>
        const SHEET_RENTAL_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSUGPACReczt9Rdq3YjiFsNrfa0NwRSTZqjqHXl1X-TPzwNLc1OKjXivvImulTgWRyyj-KuHLmYkMUb/pub?gid=0&single=true&output=csv";
        const SHEET_MANUTENZIONE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc0LjAfvMuepPzsxcOWuAvykxmW16NwcYSIH7vbPdiKulIUOBMTqBXzsR1fGuClt-tB54O5HzLfHZp/pub?gid=0&single=true&output=csv";
        const BASE_URL_GPX = "https://orzoro.github.io/resort-experience/gpx/";

        const map = L.map('map', { zoomControl: false }).setView([42.9635, 10.8631], 13);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

        function toggleOverlay(type) {
            const el = document.getElementById(type + '-overlay');
            const isHidden = (el.style.display === 'none' || el.style.display === '');
            el.style.display = isHidden ? 'block' : 'none';
            if(isHidden && type === 'rental') renderRental();
        }

        async function renderRental() {
            const grid = document.getElementById('rental-grid');
            grid.innerHTML = '<div class="col-span-full text-center py-20"><div class="animate-spin inline-block w-8 h-8 border-4 border-[#c5a059] border-t-transparent rounded-full mb-4"></div><p class="text-white uppercase font-bold tracking-widest text-xs">Sincronizzazione Flotta...</p></div>';
            
            try {
                const response = await fetch("https://corsproxy.io/?" + encodeURIComponent(SHEET_RENTAL_URL + "&cache=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(r => r.trim() !== '').slice(1);
                
                grid.innerHTML = '';

                rows.forEach(row => {
                    // Gestione avanzata delle virgole
                    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 6) return;
                    
                    const [modello, tipo, taglie, prezzo, img, cell, statoRaw] = cols.map(c => c.replace(/^"|"$/g, '').trim());
                    const stato = statoRaw || "Disponibile";
                    const isAvailable = stato.toLowerCase() === "disponibile";
                    const waLink = `https://wa.me/${cell.replace(/\D/g, '')}?text=Ciao! Vorrei info per il noleggio della ${modello}`;

                    let statoCol = "bg-green-500";
                    if(stato.toLowerCase() === "occupata") statoCol = "bg-amber-500";
                    if(stato.toLowerCase() === "in manutenzione") statoCol = "bg-red-500";

                    const card = document.createElement('div');
                    card.className = `rent-card flex flex-col ${!isAvailable ? 'opacity-60 grayscale' : ''}`;
                    card.innerHTML = `
                        <div class="relative h-56 w-full">
                            <img src="${img}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/600x400?text=Bike+Image'">
                            <div class="absolute top-4 left-4 bg-white text-slate-900 font-black px-3 py-1 rounded text-xs shadow-xl">€ ${prezzo}</div>
                            <div class="absolute top-4 right-4 ${statoCol} text-white font-black px-2 py-1 rounded text-[8px] uppercase tracking-tighter shadow-lg">${stato}</div>
                        </div>
                        <div class="p-6 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="text-2xl font-black text-white uppercase italic leading-tight mb-1">${modello}</h3>
                                <p class="text-[#c5a059] text-[10px] font-black uppercase mb-4 tracking-widest">${tipo}</p>
                                <div class="bg-slate-900/50 p-3 rounded-lg border border-white/5 text-white mb-6">
                                    <span class="text-[8px] uppercase opacity-50 block mb-1">Taglie Disponibili</span>
                                    <span class="text-sm font-bold">${taglie}</span>
                                </div>
                            </div>
                            ${isAvailable 
                                ? `<a href="${waLink}" target="_blank" class="block w-full bg-[#c5a059] text-white text-center py-3.5 rounded-xl font-black uppercase text-xs tracking-widest hover:brightness-110 active:scale-95 transition-all">Verifica Disponibilità</a>`
                                : `<div class="block w-full bg-slate-700 text-slate-400 text-center py-3.5 rounded-xl font-black uppercase text-xs tracking-widest cursor-not-allowed">Al momento non disponibile</div>`
                            }
                        </div>`;
                    grid.appendChild(card);
                });
            } catch (e) {
                grid.innerHTML = '<p class="text-white text-center py-10">Errore di caricamento. Verifica la connessione.</p>';
            }
        }

        // --- Logica Trail & Info ---
        function closePanel() { document.getElementById('info-panel').style.display = 'none'; }
        // Inizializzazione mappa e sentieri omessa per brevità, resta uguale alla versione precedente
        
    </script>
</body>
</html>
