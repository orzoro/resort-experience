<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Pelagone | Experience & Bike Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="SENTIERI.js"></script>
    <script src="POI.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        #map { flex: 1; position: relative; z-index: 10; }

        #sidebar { 
            width: 380px; height: 100%; background: #1e293b; border-right: 1px solid #334155; 
            z-index: 1001; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        @media (max-width: 768px) {
            #sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70vh; border-radius: 25px 25px 0 0; transform: translateY(calc(100% - 60px)); }
            #sidebar.open { transform: translateY(0); }
            #info-panel { left: 10px !important; right: 10px !important; bottom: 80px !important; width: calc(100% - 20px) !important; }
        }

        .filter-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; font-weight: 800; }
        .filter-btn.active { background-color: #c5a059 !important; color: white; border-color: #c5a059; }
        
        #info-panel { display: none; position: fixed; bottom: 30px; left: 410px; right: 30px; z-index: 2000; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }

        #rental-overlay { position: fixed; inset: 0; z-index: 9999; background: #0f172a; overflow-y: auto; display: none; }
        .rent-card { background: #1e293b; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; transition: transform 0.3s; }
        .rent-card:hover { transform: translateY(-5px); }

        .bg-verde { background-color: #22c55e !important; }
        .bg-blu { background-color: #3b82f6 !important; }
        .bg-rosso { background-color: #ef4444 !important; }
        .bg-nero { background-color: #000000 !important; }
    </style>
</head>
<body>
    <header class="h-[100px] bg-[#0f172a] border-b border-slate-800 flex items-center justify-between px-4 md:px-6 text-white shrink-0 relative z-[1002]">
        <div class="flex flex-col cursor-pointer" onclick="location.reload()">
            <h1 class="text-xl md:text-2xl font-black text-[#c5a059] uppercase italic leading-tight">Pelagone</h1>
            <span class="text-[7px] tracking-[0.3em] uppercase opacity-60">Experience Hub</span>
        </div>

        <div class="flex bg-slate-800/50 p-1 rounded-full border border-slate-700">
            <button onclick="filterTrails('all')" id="f-all" class="filter-btn active px-3 py-1.5 rounded-full text-[8px] uppercase">Tutti</button>
            <button onclick="filterTrails('easy')" id="f-easy" class="filter-btn px-3 py-1.5 rounded-full text-[8px] uppercase">Easy</button>
            <button onclick="filterTrails('pro')" id="f-pro" class="filter-btn px-3 py-1.5 rounded-full text-[8px] uppercase">Pro</button>
        </div>

        <button onclick="toggleOverlay('rental')" class="bg-[#c5a059] text-white px-4 py-2 rounded-full text-[9px] font-black uppercase shadow-lg active:scale-95 transition-all">🚲 Noleggio</button>
    </header>

    <div id="main-container">
        <aside id="sidebar">
            <div class="md:hidden w-full h-[60px] flex items-center justify-center cursor-pointer border-b border-slate-700 bg-slate-800" onclick="document.getElementById('sidebar').classList.toggle('open')">
                <div class="w-12 h-1 bg-slate-500 rounded-full absolute top-3"></div>
                <span class="text-white text-[10px] font-black uppercase mt-2">Sfoglia i Sentieri</span>
            </div>
            <div id="trail-list" class="p-4 space-y-3 overflow-y-auto h-[calc(100%-60px)] md:h-full"></div>
        </aside>

        <main id="map">
            <div id="info-panel">
                <button onclick="closePanel()" class="absolute -top-3 -right-3 bg-white w-8 h-8 rounded-full shadow-lg flex items-center justify-center text-slate-900 font-bold border border-slate-200">✕</button>
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div class="flex-1 w-full text-center md:text-left">
                        <h2 id="ui-nome" class="text-lg md:text-2xl font-black uppercase text-slate-800 italic mb-2 tracking-tight">Nome Trail</h2>
                        <button id="btn-download" class="bg-blue-600 text-white px-6 py-4 rounded-xl text-[10px] font-black uppercase w-full md:w-auto shadow-md">📂 Scarica GPX</button>
                    </div>
                    <div id="qrcode" class="hidden md:block bg-white p-2 rounded-lg border"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="rental-overlay" class="p-4 md:p-10">
        <div class="sticky top-0 bg-[#0f172a] py-4 mb-8 border-b border-white/10 flex justify-between items-center z-[10001]">
            <h2 class="text-2xl md:text-4xl font-black uppercase text-[#c5a059] italic">Bike Rental Fleet</h2>
            <button onclick="toggleOverlay('rental')" class="text-white text-3xl">✕</button>
        </div>
        <div id="rental-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl mx-auto pb-20 text-white"></div>
    </div>

    <script>
        const SHEET_RENTAL_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSUGPACReczt9Rdq3YjiFsNrfa0NwRSTZqjqHXl1X-TPzwNLc1OKjXivvImulTgWRyyj-KuHLmYkMUb/pub?gid=0&single=true&output=csv";
        const BASE_URL_GPX = "https://orzoro.github.io/resort-experience/gpx/";

        const map = L.map('map', { zoomControl: false }).setView([42.9635, 10.8631], 13);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

        let geoJsonLayer;
        const trailTable = {
            "SANTANSANO": "rosso", "COMO HD": "rosso", "ROGNOSO": "rosso", "DH AIONE": "rosso", 
            "AVVOLTORE": "blu", "AINA": "verde", "COMO EASY": "blu", "PRISON BREAK": "nero"
        };

        function toggleOverlay(type) {
            const el = document.getElementById(type + '-overlay');
            const isHidden = (el.style.display === 'none' || el.style.display === '');
            el.style.display = isHidden ? 'block' : 'none';
            if(isHidden) renderRental();
        }

        async function renderRental() {
            const grid = document.getElementById('rental-grid');
            grid.innerHTML = '<p class="col-span-full text-center py-20 opacity-50 italic">Sincronizzazione flotta...</p>';
            try {
                const response = await fetch("https://corsproxy.io/?" + encodeURIComponent(SHEET_RENTAL_URL + "&cb=" + Date.now()));
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(r => r.trim() !== '').slice(1);
                grid.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 6) return;
                    
                    const [modello, tipo, taglie, prezzo, img, cell, statoRaw] = cols.map(c => c.replace(/^"|"$/g, '').trim());
                    const stato = statoRaw || "Disponibile";
                    const isAvailable = stato.toLowerCase() === "disponibile";
                    
                    let statoClass = "bg-green-500";
                    if (stato.toLowerCase() === "occupata") statoClass = "bg-amber-500";
                    if (stato.toLowerCase() === "in manutenzione") statoClass = "bg-red-500";

                    const card = document.createElement('div');
                    card.className = `rent-card flex flex-col ${!isAvailable ? 'opacity-70' : ''}`;
                    card.innerHTML = `
                        <div class="relative h-48">
                            <img src="${img}" class="w-full h-full object-cover ${!isAvailable ? 'grayscale' : ''}" onerror="this.src='https://via.placeholder.com/400x300?text=Bike'">
                            <div class="absolute top-3 left-3 bg-white text-black text-[10px] font-black px-2 py-1 rounded">€ ${prezzo}</div>
                            <div class="absolute top-3 right-3 ${statoClass} text-white text-[8px] font-black px-2 py-1 rounded uppercase">${stato}</div>
                        </div>
                        <div class="p-5 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="text-lg font-black uppercase text-white leading-tight mb-1 italic">${modello}</h3>
                                <p class="text-[9px] text-[#c5a059] font-bold uppercase mb-4 tracking-widest">${tipo}</p>
                                <p class="text-white/60 text-[10px] font-bold uppercase mb-4 tracking-tighter">Taglie: ${taglie}</p>
                            </div>
                            ${isAvailable 
                                ? `<a href="https://wa.me/${cell.replace(/\D/g, '')}" target="_blank" class="bg-[#c5a059] text-white text-center py-3 rounded-xl font-black uppercase text-[10px] tracking-widest hover:brightness-110 transition-all">Prenota</a>`
                                : `<div class="bg-slate-700 text-slate-400 text-center py-3 rounded-xl font-black uppercase text-[10px] tracking-widest">Non Disponibile</div>`
                            }
                        </div>`;
                    grid.appendChild(card);
                });
            } catch (e) { grid.innerHTML = 'Errore caricamento.'; }
        }

        function renderList(filter = 'all') {
            const list = document.getElementById('trail-list');
            if (!list || !geoJsonLayer) return;
            list.innerHTML = '';
            geoJsonLayer.eachLayer(layer => {
                const nome = layer.feature.properties.NOME;
                const col = trailTable[nome.toUpperCase()] || "blu";
                const tailBg = { "verde": "bg-verde", "blu": "bg-blu", "rosso": "bg-rosso", "nero": "bg-nero" };
                const hexMap = { "verde": "#22c55e", "blu": "#3b82f6", "rosso": "#ef4444", "nero": "#000000" };

                if (filter === 'all' || (filter === 'easy' && (col === 'verde' || col === 'blu')) || (filter === 'pro' && (col === 'rosso' || col === 'nero'))) {
                    layer.setStyle({ color: hexMap[col], weight: 5 });
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-xl flex justify-between items-center text-white cursor-pointer ${tailBg[col]} active:scale-95 transition-all`;
                    card.innerHTML = `<span class="font-black uppercase text-[10px]">${nome}</span>`;
                    card.onclick = () => {
                        map.fitBounds(layer.getBounds(), { padding: [50, 50] });
                        document.getElementById('ui-nome').innerText = nome;
                        document.getElementById('info-panel').style.display = 'block';
                        const gpxLink = BASE_URL_GPX + nome.toLowerCase().replace(/\s+/g, '_') + ".gpx";
                        document.getElementById('btn-download').onclick = () => window.open(gpxLink, '_blank');
                    };
                    list.appendChild(card);
                    layer.addTo(map);
                } else { map.removeLayer(layer); }
            });
        }

        function filterTrails(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('f-' + type).classList.add('active');
            renderList(type);
        }

        function closePanel() { document.getElementById('info-panel').style.display = 'none'; }

        if (typeof datiSentieri !== 'undefined') {
            geoJsonLayer = L.geoJSON(datiSentieri);
            renderList();
        }
    </script>
</body>
</html>
